{ref:"Mt 14,27",texte:"Take courage! It is I. Do not be afraid.",theme:"Trust",resume:"Jesus comes to meet the disciples on the water.",coeur:"In the storm of the night, Jesus comes. His first word is: Courage.",invitation:"Hear Jesus say to you today: Courage, it is I, do not be afraid."},
{ref:"Mt 18,3",texte:"Unless you change and become like little children, you will never enter the kingdom of heaven.",theme:"Spiritual childhood",resume:"The necessary conversion toward childlike simplicity.",coeur:"The child receives without deserving, trusts without calculating, surrenders without fear.",invitation:"Approach God today with the simplicity of a child."},
{ref:"Mt 18,20",texte:"For where two or three gather in my name, there am I with them.",theme:"Community",resume:"The presence of Christ is guaranteed even in small gatherings.",coeur:"Two or three. No need for a full cathedral. Jesus is there.",invitation:"Gather with another Christian to pray together, even briefly."},
{ref:"Mt 22,37",texte:"Love the Lord your God with all your heart and with all your soul and with all your mind.",theme:"Love of God",resume:"The first and greatest commandment.",coeur:"Loving God with your whole being is both an ideal and a journey.",invitation:"Make an explicit act of love toward God today. Tell Him you love Him."},
{ref:"Mt 25,40",texte:"Whatever you did for one of the least of these brothers and sisters of mine, you did for me.",theme:"Love of neighbor",resume:"Christ identifies himself with the poorest.",coeur:"Serving the poor is serving Jesus himself.",invitation:"Do something concrete for someone in need today."},
{ref:"Mt 28,20",texte:"I am with you always, to the very end of the age.",theme:"Presence",resume:"Jesus' final promise: a permanent presence.",coeur:"Every day. Even the most ordinary, most burdensome ones.",invitation:"Start each morning this week recalling: Jesus is with me today."},
{ref:"Mk 1,15",texte:"The kingdom of God has come near. Repent and believe the good news!",theme:"Conversion",resume:"Jesus' first public words.",coeur:"The Kingdom is not far away — it is here. Conversion is a turning of the gaze.",invitation:"What prevents you from believing fully? Talk to God about it honestly."},
{ref:"Mk 1,17",texte:"Come, follow me, and I will send you out to fish for people.",theme:"Vocation",resume:"Jesus calls ordinary people and entrusts them with an extraordinary mission.",coeur:"He does not look for perfect people. What matters is responding to the invitation.",invitation:"What is Jesus calling you to do today?"},
{ref:"Mk 1,35",texte:"Very early in the morning, while it was still dark, Jesus went to a solitary place and prayed.",theme:"Prayer",resume:"Jesus himself rises before dawn to pray in silence.",coeur:"If Jesus needed this time alone with the Father, how much more do we.",invitation:"Rise one morning this week for a time of silence and prayer."},
{ref:"Mk 4,39",texte:"Quiet! Be still! The wind died down and it was completely calm.",theme:"Trust",resume:"Jesus, master of chaos, shows his power.",coeur:"Jesus can also say to your soul: Quiet, be still.",invitation:"Ask Jesus to bring calm to your inner agitation."},
{ref:"Mk 4,40",texte:"Why are you so afraid? Do you still have no faith?",theme:"Faith",resume:"Jesus' question after calming the storm.",coeur:"Fear and faith do not easily coexist. Jesus invites fear to transform into trust.",invitation:"Name your main fear. Ask for the grace to transform it into trust."},
{ref:"Mk 6,34",texte:"When Jesus saw the large crowd, he had compassion on them, because they were like sheep without a shepherd.",theme:"Compassion",resume:"The compassion of Jesus facing a bewildered crowd.",coeur:"Jesus sees the crowds — he does not avoid them. He lets himself be touched by their wandering.",invitation:"Pray today for those who are lost, alone, without spiritual bearings."},
{ref:"Mk 8,34",texte:"Whoever wants to be my disciple must deny themselves and take up their cross and follow me.",theme:"Discipleship",resume:"The path of following Christ passes through self-denial.",coeur:"Taking up your cross means accepting what comes and offering it.",invitation:"Is there a cross you are carrying? Carry it with Jesus rather than alone."},
{ref:"Mk 9,24",texte:"I do believe; help me overcome my unbelief!",theme:"Faith",resume:"The most honest prayer in the Gospel.",coeur:"This prayer does not pretend to perfect faith. It reaches out in ambiguity. And Jesus responds.",invitation:"Pray with your own words: I believe, but help my unbelief."},
{ref:"Mk 10,14",texte:"Let the little children come to me, for the kingdom of God belongs to such as these.",theme:"Spiritual childhood",resume:"Children are the model of the Kingdom.",coeur:"The child receives without deserving. Trusts without calculating.",invitation:"Approach God today with the simplicity of a child."},
{ref:"Mk 10,27",texte:"With man this is impossible, but not with God; all things are possible with God.",theme:"Hope",resume:"What is beyond our strength is not beyond God's reach.",coeur:"God is not limited by our impossibles.",invitation:"Offer God a situation you consider hopeless."},
{ref:"Mk 10,45",texte:"The Son of Man did not come to be served, but to serve.",theme:"Service",resume:"The identity of Jesus as servant.",coeur:"The Lord of the universe comes to serve. This logic overturns all our hierarchies.",invitation:"Serve someone today without expecting anything in return."},
{ref:"Mk 12,30",texte:"Love the Lord your God with all your heart and with all your soul and with all your mind and with all your strength.",theme:"Love of God",resume:"The first commandment: a total, unreserved love.",coeur:"Loving God with your whole being is an ideal and a path.",invitation:"Make an explicit act of love toward God today."},
{ref:"Mk 16,6",texte:"He has risen! He is not here.",theme:"Resurrection",resume:"The announcement of the resurrection.",coeur:"The tomb is empty. Death does not have the last word.",invitation:"Let the joy of the Resurrection enter your heart today."},
{ref:"Lk 1,38",texte:"I am the Lord's servant. May your word to me be fulfilled.",theme:"Consent",resume:"Mary's fiat: the most decisive consent in history.",coeur:"Mary does not understand everything. But she says yes. An act of total trust.",invitation:"Is there a yes that God is waiting for from you?"},
{ref:"Lk 2,10",texte:"Do not be afraid. I bring you good news that will cause great joy for all the people.",theme:"Joy",resume:"The announcement of Jesus' birth: great joy for all.",coeur:"The joy of Christmas is not reserved for a time of year. It is permanent: God has come.",invitation:"Let the joy of the Incarnation inhabit you today."},
{ref:"Lk 2,19",texte:"Mary treasured up all these things and pondered them in her heart.",theme:"Contemplation",resume:"Mary, model of Lectio Divina.",coeur:"Keeping things in the heart, letting them ripen — Mary walks this path before you.",invitation:"Choose one word from today's Scripture. Carry it throughout the day."},
{ref:"Lk 4,18",texte:"The Spirit of the Lord is on me to proclaim good news to the poor.",theme:"Mission",resume:"Jesus reveals his mission.",coeur:"This mission is also ours through baptism.",invitation:"How can you be a bearer of Good News today, concretely?"},
{ref:"Lk 6,36",texte:"Be merciful, just as your Father is merciful.",theme:"Mercy",resume:"The call to imitate divine mercy.",coeur:"God's mercy does not calculate and does not tire.",invitation:"Toward whom do you struggle to be merciful? Ask for the grace."},
{ref:"Lk 6,38",texte:"Give, and it will be given to you. A good measure, pressed down, shaken together and running over.",theme:"Generosity",resume:"Generosity calls a superabundant response from God.",coeur:"God does not give back in proportion. He gives in excess.",invitation:"Make a gesture of generosity today that costs you a little."},
{ref:"Lk 10,27",texte:"Love the Lord your God... and love your neighbor as yourself.",theme:"Love",resume:"The double commandment of love.",coeur:"The love of God and love of neighbor are not two commandments but one.",invitation:"Who is your neighbor today? Make a concrete gesture of love."},
{ref:"Lk 10,41",texte:"Martha, you are worried and upset about many things, but few things are needed.",theme:"Contemplation",resume:"Jesus reminds Martha that presence to Him precedes action.",coeur:"Jesus does not condemn action — he simply reminds us that relationship comes first.",invitation:"Give Jesus some simple time of presence today."},
{ref:"Lk 11,13",texte:"How much more will your Father in heaven give the Holy Spirit to those who ask him!",theme:"Holy Spirit",resume:"The promise of the gift of the Spirit to those who ask.",coeur:"The Spirit is the greatest gift. And God gives it generously.",invitation:"Ask the Holy Spirit right now, simply and confidently."},
{ref:"Lk 12,32",texte:"Do not be afraid, little flock, for your Father has been pleased to give you the kingdom.",theme:"Trust",resume:"God gives the Kingdom out of pure love.",coeur:"Little flock — the image is tender. The Kingdom is given, not earned.",invitation:"Receive this grace: the Kingdom is given to you."},
{ref:"Lk 15,7",texte:"There will be more rejoicing in heaven over one sinner who repents.",theme:"Mercy",resume:"God's joy when a sinner returns.",coeur:"God does not await us with reproaches. He awaits us with overflowing joy.",invitation:"Return to God today if you have been far from him. His joy awaits you."},
{ref:"Lk 15,20",texte:"While he was still a long way off, his father saw him and was filled with compassion; he ran to his son.",theme:"Mercy",resume:"The most beautiful image of divine mercy.",coeur:"God runs. He rushes. His mercy is faster than our sins.",invitation:"Receive the Father's love today. Let him take you in his arms."},
{ref:"Lk 17,21",texte:"The kingdom of God is in your midst.",theme:"Interiority",resume:"The Kingdom is already within us.",coeur:"This verse is an invitation to seek God within, in the silence of the heart.",invitation:"Be silent for five minutes today. Seek the Kingdom within."},
{ref:"Lk 19,10",texte:"The Son of Man came to seek and to save the lost.",theme:"Salvation",resume:"Jesus' mission summed up in one sentence.",coeur:"He came to seek. Not to wait. To seek.",invitation:"Meditate: Jesus sought you. Where did you encounter him?"},
{ref:"Lk 23,34",texte:"Father, forgive them, for they do not know what they are doing.",theme:"Forgiveness",resume:"Jesus' prayer on the cross for his executioners.",coeur:"On the cross, Jesus prays for those who kill him. Love at its absolute summit.",invitation:"Pray for someone who hurt you without realizing it."},
{ref:"Lk 23,43",texte:"Truly I tell you, today you will be with me in paradise.",theme:"Mercy",resume:"Jesus' promise to the good thief: salvation at the last moment.",coeur:"Today. Jesus' mercy is immediate.",invitation:"Whatever your past, believe that God's mercy is greater."},
{ref:"Lk 24,29",texte:"Stay with us, for it is nearly evening.",theme:"Presence",resume:"The disciples of Emmaus invite the Stranger to stay.",coeur:"We often recognize Jesus after the fact. But we can invite him to stay.",invitation:"Invite Jesus to remain with you this evening."},
{ref:"Jn 1,14",texte:"The Word became flesh and made his dwelling among us.",theme:"Incarnation",resume:"The heart of the Christian mystery: God becomes man.",coeur:"God did not remain at a distance. He dwelt among us.",invitation:"Contemplate the face of someone you love. The glory of God can shine there."},
{ref:"Jn 3,16",texte:"For God so loved the world that he gave his one and only Son.",theme:"Love of God",resume:"The synthesis of divine love.",coeur:"God did not love theoretically. He gave everything. His love is concrete and irrevocable.",invitation:"Replace 'the world' with your own name. Let this verse reach you personally."},
{ref:"Jn 4,14",texte:"Whoever drinks the water I give them will never thirst.",theme:"Interior life",resume:"Jesus promises living water that quenches the deep thirst of the soul.",coeur:"Only God can quench the deep thirst of your soul.",invitation:"Name your deepest thirst. Bring it to Jesus."},
{ref:"Jn 6,35",texte:"I am the bread of life. Whoever comes to me will never go hungry.",theme:"Eucharist",resume:"Jesus reveals himself as essential nourishment for the soul.",coeur:"Only Jesus, the bread of life, can truly nourish us.",invitation:"Receive communion this week with renewed wonder."},
{ref:"Jn 8,12",texte:"I am the light of the world. Whoever follows me will never walk in darkness.",theme:"Light",resume:"Jesus reveals himself as the light guiding in darkness.",coeur:"Jesus does not promise to remove dark areas, but to walk through them with you.",invitation:"In which dark area do you need the light of Jesus right now?"},
{ref:"Jn 8,32",texte:"You will know the truth, and the truth will set you free.",theme:"Freedom",resume:"The truth revealed by Jesus as a path of inner freedom.",coeur:"The truth Jesus offers is not first a doctrine — it is a Person.",invitation:"Is there a lie about yourself you need to be freed from?"},
{ref:"Jn 10,10",texte:"I have come that they may have life, and have it to the full.",theme:"Life",resume:"The life Jesus brings is fullness.",coeur:"Life to the full is a life inhabited, meaningful, connected to God and others.",invitation:"In what ways is your life abundant? Give thanks."},
{ref:"Jn 10,11",texte:"I am the good shepherd. The good shepherd lays down his life for the sheep.",theme:"Love",resume:"The total love of the shepherd who goes as far as self-giving.",coeur:"The good shepherd knows each sheep by name. You are known, loved, sought.",invitation:"Meditate that Jesus knows you by name. Let that touch you."},
{ref:"Jn 11,25",texte:"I am the resurrection and the life. The one who believes in me will live.",theme:"Resurrection",resume:"Jesus reveals his victory over death.",coeur:"Facing death, Jesus answers: I am the life.",invitation:"If you carry grief or fear of death, entrust it to the One who is the Resurrection."},
{ref:"Jn 11,35",texte:"Jesus wept.",theme:"Compassion",resume:"The shortest verse in the Bible: Jesus weeps with us.",coeur:"God weeps with us. He is not indifferent to our grief.",invitation:"If you carry grief, let Jesus weep with you."},
{ref:"Jn 13,34",texte:"Love one another as I have loved you.",theme:"Love",resume:"Jesus' central commandment.",coeur:"'As I have loved you' — that is the measure. A love that goes all the way.",invitation:"Who most needs to be loved around you today?"},
{ref:"Jn 14,1",texte:"Do not let your hearts be troubled. You believe in God; believe also in me.",theme:"Peace",resume:"Jesus calms the troubled hearts of his disciples.",coeur:"Jesus knows our troubles. He lays his hand on them and says: Do not be afraid.",invitation:"Lay your current trouble before Jesus. Let him say these words to you."},
{ref:"Jn 14,6",texte:"I am the way and the truth and the life.",theme:"Mystery",resume:"Jesus is himself the answer to all spiritual searching.",coeur:"Not a road, not a teaching — a Person. The way has a face.",invitation:"Which of the three terms touches you most: Way, Truth, or Life?"},
{ref:"Jn 14,16",texte:"I will ask the Father, and he will give you another advocate to help you and be with you forever.",theme:"Holy Spirit",resume:"The promise of the Paraclete: the Holy Spirit as permanent presence.",coeur:"You are not orphaned. The Spirit is with you forever.",invitation:"Speak to the Holy Spirit today. Ask him to guide you."},
{ref:"Jn 14,27",texte:"Peace I leave with you; my peace I give you.",theme:"Peace",resume:"The peace of Jesus is of a different nature from the world's peace.",coeur:"Christ's peace exists in the heart of storms. It is a presence, not an absence.",invitation:"Ask for the peace of Christ for your day."},
{ref:"Jn 15,4",texte:"Remain in me, as I also remain in you.",theme:"Union with God",resume:"Invitation to a permanent union with Christ.",coeur:"Remaining in Jesus is not a spiritual performance. It is a state of mutual inhabitation.",invitation:"Return to this awareness throughout the day: Jesus remains in me."},
{ref:"Jn 15,5",texte:"I am the vine; you are the branches. If you remain in me, you will bear much fruit.",theme:"Fruitfulness",resume:"Our fruitfulness comes from our union with Christ.",coeur:"Fruit comes from our union with the vine, not from our separate efforts.",invitation:"Does your action come from union with God or from your effort alone?"},
{ref:"Jn 15,9",texte:"As the Father has loved me, so have I loved you. Now remain in my love.",theme:"Love of God",resume:"Christ's love for us equals the Father's love for the Son.",coeur:"This love is immense, eternal, unconditional.",invitation:"Repeat slowly: Jesus loves me as the Father loves him. Let that sink in."},
{ref:"Jn 15,13",texte:"Greater love has no one than this: to lay down one's life for one's friends.",theme:"Love",resume:"The ultimate definition of love according to Jesus.",coeur:"Jesus does not speak as a theorist. He is living what he says.",invitation:"Think of someone who gave much for you. Thank them."},
{ref:"Jn 16,22",texte:"Your hearts will rejoice, and no one will take away your joy.",theme:"Hope",resume:"The promise of a definitive, indestructible joy.",coeur:"No one can take this joy from you. It is founded on the presence of the Risen One.",invitation:"If you are in sadness, hold on to this promise."},
{ref:"Jn 16,33",texte:"In this world you will have trouble. But take heart! I have overcome the world.",theme:"Hope",resume:"Christ's victory is our foundation in trial.",coeur:"Jesus promises not the absence of suffering, but his victorious presence.",invitation:"Your current trial does not have the last word. Jesus has overcome."},
{ref:"Jn 17,3",texte:"Now this is eternal life: that they know you, the only true God.",theme:"Eternal life",resume:"Eternal life as a relationship of intimate knowledge.",coeur:"Knowing God — not just knowing things about Him, but meeting Him.",invitation:"Deepen your intimate knowledge of God today."},
{ref:"Jn 20,19",texte:"Jesus came and stood among them and said, Peace be with you!",theme:"Peace",resume:"The Risen One's first word to his disciples.",coeur:"The disciples are locked in, afraid, broken. Jesus passes through their walls.",invitation:"Let Jesus pass through the walls of your closed heart today."},
{ref:"Jn 20,27",texte:"Stop doubting and believe.",theme:"Faith",resume:"Jesus welcomes Thomas' doubt with tenderness.",coeur:"Jesus does not condemn Thomas for his doubt. He comes to him with his wounds.",invitation:"Bring your doubts to God. He can transform them into faith."},
{ref:"Jn 21,15",texte:"Simon son of John, do you love me?",theme:"Love",resume:"The Risen Jesus questions Peter about his love.",coeur:"After the denial, Jesus reproaches nothing. He asks: Do you love me?",invitation:"Answer this question today: Do you love me?"},
{ref:"Acts 1,8",texte:"You will receive power when the Holy Spirit comes on you; and you will be my witnesses.",theme:"Mission",resume:"The universal mission animated by the Spirit.",coeur:"We are not alone in witnessing. The Spirit precedes and accompanies us.",invitation:"Ask the Holy Spirit to guide your daily witness today."},
{ref:"Acts 2,4",texte:"All of them were filled with the Holy Spirit.",theme:"Holy Spirit",resume:"Pentecost: the Spirit transforms the disciples.",coeur:"The Spirit can transform fearful men into courageous witnesses.",invitation:"Ask for an outpouring of the Holy Spirit for your life today."},
{ref:"Acts 4,20",texte:"We cannot help speaking about what we have seen and heard.",theme:"Witness",resume:"Peter and John cannot keep silent about what they lived with Jesus.",coeur:"Testimony is born of experience. You can only share what you have truly encountered.",invitation:"Tell someone what God has done in your life, even briefly."},
{ref:"Rom 5,5",texte:"Hope does not put us to shame, because God's love has been poured out into our hearts.",theme:"Hope",resume:"The Spirit is the guarantor of Christian hope.",coeur:"Christian hope rests on God's love poured into us.",invitation:"Renew your hope today. Lean on God's love, not on circumstances."},
{ref:"Rom 8,1",texte:"There is now no condemnation for those who are in Christ Jesus.",theme:"Freedom",resume:"The radical freedom of the Christian.",coeur:"No condemnation. This freedom is a gift.",invitation:"If a voice condemns you, answer it with this verse."},
{ref:"Rom 8,15",texte:"You received the Spirit of sonship. And by him we cry, Abba, Father.",theme:"Filiation",resume:"The Spirit constitutes us sons and daughters of God.",coeur:"Fear is the mark of slavery. Freedom is the mark of filiation.",invitation:"You are a child of God, not a slave."},
{ref:"Rom 8,26",texte:"The Spirit helps us in our weakness. We do not know what we ought to pray for.",theme:"Prayer",resume:"The Spirit prays in us when we no longer know how to pray.",coeur:"Even when prayer is impossible, the Spirit takes over.",invitation:"Entrust your inability to pray to the Spirit today."},
{ref:"Rom 8,28",texte:"In all things God works for the good of those who love him.",theme:"Providence",resume:"Divine Providence works even in adversity.",coeur:"'All things' — even trials, failures, betrayals. God can draw good from all of it.",invitation:"Ask God to show you how He is drawing good from your difficult situation."},
{ref:"Rom 8,31",texte:"If God is for us, who can be against us?",theme:"Trust",resume:"The absolute certainty of God's protecting love.",coeur:"Nothing can prevail against the one God supports.",invitation:"Recite this verse facing your current obstacles."},
{ref:"Rom 8,38",texte:"Nothing will be able to separate us from the love of God in Christ Jesus.",theme:"Love of God",resume:"The inseparability of God's love.",coeur:"When everything wavers, God's love remains.",invitation:"Carry this verse as a shield in moments of despair."},
{ref:"Rom 12,2",texte:"Be transformed by the renewing of your mind.",theme:"Conversion",resume:"Conversion is an inner transformation of perspective.",coeur:"Transformation comes from within. Changing how you see, think, judge.",invitation:"Ask the Spirit of renewal for your way of thinking."},
{ref:"Rom 12,12",texte:"Be joyful in hope, patient in affliction, faithful in prayer.",theme:"Christian life",resume:"Three fundamental attitudes of the Christian in trial.",coeur:"Joy, patience, prayer — a compact program of spiritual life.",invitation:"Which of these three attitudes do you lack most? Work on it today."},
{ref:"1Cor 13,4",texte:"Love is patient, love is kind. It does not envy, it does not boast.",theme:"Love",resume:"Paul describes true love through its concrete qualities.",coeur:"This text is a mirror. Replace 'love' with your own name.",invitation:"Read 1Cor 13 slowly replacing 'love' with your own name."},
{ref:"1Cor 13,13",texte:"These three remain: faith, hope and love. But the greatest of these is love.",theme:"Love",resume:"The three theological virtues with love's primacy.",coeur:"Only love endures for eternity.",invitation:"Make a gratuitous act of love today, with no expectation of return."},
{ref:"2Cor 4,16",texte:"Though outwardly we are wasting away, yet inwardly we are being renewed day by day.",theme:"Hope",resume:"Inner renewal despite outer decay.",coeur:"The Spirit renews from within even when the exterior is deteriorating.",invitation:"Take care of your inner life through a time of prayer and silence."},
{ref:"2Cor 5,17",texte:"If anyone is in Christ, the new creation has come.",theme:"Conversion",resume:"In Christ, a new creation begins.",coeur:"You are not condemned to remain as you are. In Christ there is a perpetual new beginning.",invitation:"Receive your identity as a new creation today."},
{ref:"2Cor 12,9",texte:"My grace is sufficient for you, for my power is made perfect in weakness.",theme:"Weakness",resume:"God's power manifests in our weakness.",coeur:"God chooses our flaws as places to deploy his power.",invitation:"Offer your main weakness to God as a place for His power."},
{ref:"Gal 2,20",texte:"I no longer live, but Christ lives in me.",theme:"Union with God",resume:"Christian life as participation in the life of Christ.",coeur:"This reversal is the heart of Christian life.",invitation:"Meditate on this phrase at waking: It is no longer I who live, but Christ."},
{ref:"Gal 5,22",texte:"The fruit of the Spirit is love, joy, peace, patience, kindness, goodness, gentleness.",theme:"Holy Spirit",resume:"The visible fruits of a life inhabited by God.",coeur:"These fruits are not obtained by effort. They come from the Spirit.",invitation:"Which of these fruits is lacking in your life? Ask the Holy Spirit for it."},
{ref:"Eph 2,8",texte:"It is by grace you have been saved, through faith — this is the gift of God.",theme:"Grace",resume:"Salvation is entirely a free gift from God.",coeur:"We do not earn our salvation. We receive it.",invitation:"Give thanks for what you have not deserved."},
{ref:"Eph 3,17",texte:"That Christ may dwell in your hearts through faith, rooted and established in love.",theme:"Union with God",resume:"Paul prays that Christ may settle deeply in hearts.",coeur:"A deeply rooted tree withstands storms. A heart rooted in Christ's love can face any trial.",invitation:"Check the depth of your spiritual roots."},
{ref:"Eph 4,32",texte:"Be kind and compassionate to one another, forgiving each other, just as in Christ God forgave you.",theme:"Forgiveness",resume:"The model of Christian forgiveness is God's own forgiveness.",coeur:"Forgiving as God forgives — without conditions, without calculation, out of pure love.",invitation:"Forgive someone today as God has forgiven you."},
{ref:"Phil 4,4",texte:"Rejoice in the Lord always. I will say it again: Rejoice!",theme:"Joy",resume:"Paul commands joy as a spiritual posture.",coeur:"Christian joy is an orientation of the soul toward God.",invitation:"Choose joy today. The deep joy anchored in God."},
{ref:"Phil 4,6",texte:"Do not be anxious about anything, but in every situation present your requests to God.",theme:"Prayer",resume:"Paul proposes prayer as an antidote to anxiety.",coeur:"Transform every anxiety into prayer.",invitation:"Choose one of your worries and transform it into a specific prayer right now."},
{ref:"Phil 4,7",texte:"The peace of God, which transcends all understanding, will guard your hearts.",theme:"Peace",resume:"Divine peace surpasses all human comprehension.",coeur:"This peace does not depend on circumstances. It comes from God.",invitation:"Ask for this peace that surpasses understanding."},
{ref:"Phil 4,13",texte:"I can do all this through him who gives me strength.",theme:"Strength",resume:"Paul expresses absolute confidence in the strength Christ gives him.",coeur:"Not: I can do everything by my will. But: through Him who strengthens me.",invitation:"Face your challenge today with this confidence."},
{ref:"Col 3,16",texte:"Let the message of Christ dwell among you richly.",theme:"Word",resume:"The invitation to let the Word inhabit our inner life abundantly.",coeur:"The Word is not meant to stay in books. It is meant to inhabit our hearts.",invitation:"Choose a verse to memorize this week. Let it inhabit you."},
{ref:"1Thes 5,16",texte:"Rejoice always.",theme:"Joy",resume:"Paul's shortest exhortation.",coeur:"Joy is not reserved for happy days. It is a spiritual decision.",invitation:"Make the conscious choice of joy today."},
{ref:"1Thes 5,17",texte:"Pray continually.",theme:"Prayer",resume:"Continuous prayer as the atmosphere of Christian life.",coeur:"To pray continually is to live in an ongoing inner conversation with God.",invitation:"Adopt a short prayer formula to repeat throughout your day."},
{ref:"1Thes 5,18",texte:"Give thanks in all circumstances.",theme:"Gratitude",resume:"Thanksgiving in all circumstances.",coeur:"Giving thanks in trial is not resignation. It is faith that God can draw good from all things.",invitation:"Give thanks for something difficult you are going through."},
{ref:"Heb 4,12",texte:"The word of God is alive and active, sharper than any double-edged sword.",theme:"Word",resume:"God's Word is living and powerful.",coeur:"The Word is not an inert text. It is alive. It acts.",invitation:"Read a passage of Scripture today, giving it time to work in you."},
{ref:"Heb 11,1",texte:"Faith is confidence in what we hope for and assurance about what we do not see.",theme:"Faith",resume:"The classic definition of faith.",coeur:"Faith is about what we do not yet see but which is more real than what we see.",invitation:"What does your faith rest on today?"},
{ref:"Heb 13,8",texte:"Jesus Christ is the same yesterday and today and forever.",theme:"Faithfulness",resume:"The immutability of Christ as the foundation of faith.",coeur:"Everything changes. But Jesus Christ does not change. His faithfulness is absolute.",invitation:"Lean on the immutable faithfulness of Christ today."},
{ref:"Jas 1,17",texte:"Every good and perfect gift is from above.",theme:"Gratitude",resume:"Every good thing received comes from God.",coeur:"Nothing good around us is the fruit of mere chance. Every good thing is a gift from above.",invitation:"List three excellent gifts in your life. Thank the giver."},
{ref:"Jas 4,8",texte:"Come near to God and he will come near to you.",theme:"Prayer",resume:"The reciprocity of movement toward God.",coeur:"God respects our freedom. Every step toward Him is received and accompanied.",invitation:"Take one concrete step toward God today."},
{ref:"1Pet 1,8",texte:"Though you have not seen him, you love him; though you do not see him now, you believe in him.",theme:"Faith",resume:"The faith that loves without seeing.",coeur:"We have not seen Jesus. And yet we love him. This faith is an extraordinary grace.",invitation:"Let this love rise in you for the One you have not seen."},

{ref:"Jn 6,35",texte:"Yo soy el pan de vida; el que a mí viene, nunca tendrá hambre.",theme:"Eucaristía",resume:"Jesús se revela como alimento esencial del alma.",coeur:"Solo Jesús puede saciarnos verdaderamente.",invitation:"Participa en la Eucaristía esta semana con una mirada renovada."},
{ref:"Jn 8,12",texte:"Yo soy la luz del mundo; el que me sigue, no andará en tinieblas.",theme:"Luz",resume:"Jesús se revela como luz que guía en la oscuridad.",coeur:"Jesús no promete suprimir las zonas de sombra, sino atravesarlas con nosotros, iluminándolas.",invitation:"¿En qué zona de sombra necesitas la luz de Jesús ahora mismo?"},
{ref:"Jn 8,32",texte:"Y conoceréis la verdad, y la verdad os hará libres.",theme:"Libertad",resume:"La verdad revelada por Jesús como camino de libertad interior.",coeur:"La verdad que Jesús ofrece no es primero una doctrina — es una Persona.",invitation:"¿Hay alguna mentira sobre ti mismo de la que necesites ser liberado?"},
{ref:"Jn 10,10",texte:"Yo he venido para que tengan vida, y para que la tengan en abundancia.",theme:"Vida",resume:"La vida que Jesús trae es plenitud.",coeur:"La vida en abundancia es una vida habitada, significativa, conectada a Dios y a los demás.",invitation:"¿En qué es abundante tu vida? Da gracias."},
{ref:"Jn 10,11",texte:"Yo soy el buen pastor; el buen pastor su vida da por las ovejas.",theme:"Amor",resume:"El amor total del pastor que llega hasta el don de sí mismo.",coeur:"El buen pastor conoce a cada oveja por su nombre. Eres conocido, amado, buscado.",invitation:"Medita que Jesús te conoce por tu nombre. Déjate tocar por eso."},
{ref:"Jn 11,25",texte:"Yo soy la resurrección y la vida; el que cree en mí, aunque esté muerto, vivirá.",theme:"Resurrección",resume:"Jesús revela su victoria sobre la muerte.",coeur:"Frente a la muerte, Jesús responde: Yo soy la vida.",invitation:"Si llevas un duelo o miedo a la muerte, confíalo a Quien es la Resurrección."},
{ref:"Jn 11,35",texte:"Jesús lloró.",theme:"Compasión",resume:"El versículo más corto de la Biblia: Jesús llora con nosotros.",coeur:"Dios llora con nosotros. No es indiferente a nuestros duelos.",invitation:"Si llevas un duelo, deja que Jesús llore contigo."},
{ref:"Jn 13,34",texte:"Que os améis unos a otros; como yo os he amado.",theme:"Amor",resume:"El mandamiento central de Jesús.",coeur:"'Como yo os he amado' — esa es la medida. Un amor que va hasta el final.",invitation:"¿Quién más necesita ser amado a tu alrededor hoy?"},
{ref:"Jn 14,1",texte:"No se turbe vuestro corazón; creéis en Dios, creed también en mí.",theme:"Paz",resume:"Jesús calma los corazones turbados de sus discípulos.",coeur:"Jesús conoce nuestras turbaciones. Pone su mano sobre ellas y dice: No temáis.",invitation:"Pon tu turbación actual ante Jesús. Déjale decirte estas palabras."},
{ref:"Jn 14,6",texte:"Yo soy el camino, y la verdad, y la vida.",theme:"Misterio",resume:"Jesús es él mismo la respuesta a toda búsqueda espiritual.",coeur:"No un camino, no una enseñanza — una Persona. El camino tiene un rostro.",invitation:"¿Cuál de los tres términos te toca más hoy: Camino, Verdad, o Vida?"},
{ref:"Jn 14,16",texte:"Yo rogaré al Padre, y os dará otro Consolador, para que esté con vosotros para siempre.",theme:"Espíritu Santo",resume:"La promesa del Paráclito: el Espíritu Santo como presencia permanente.",coeur:"No sois huérfanos. El Espíritu está con vosotros para siempre.",invitation:"Habla al Espíritu Santo hoy. Pídele que te guíe."},
{ref:"Jn 14,27",texte:"La paz os dejo, mi paz os doy.",theme:"Paz",resume:"La paz de Jesús es de una naturaleza diferente a la del mundo.",coeur:"La paz de Cristo existe en el corazón de las tormentas. Es una presencia, no una ausencia.",invitation:"Pide la paz de Cristo para tu día."},
{ref:"Jn 15,4",texte:"Permaneced en mí, y yo en vosotros.",theme:"Unión con Dios",resume:"Invitación a una unión permanente con Cristo.",coeur:"Permanecer en Jesús no es una actuación espiritual. Es un estado de relación mutua.",invitation:"A lo largo del día, vuelve a esta conciencia: Jesús permanece en mí."},
{ref:"Jn 15,5",texte:"Yo soy la vid, vosotros los pámpanos. El que permanece en mí, y yo en él, éste lleva mucho fruto.",theme:"Fecundidad",resume:"Nuestra fecundidad viene de nuestra unión con Cristo.",coeur:"El fruto viene de nuestra unión con la vid, no de nuestros esfuerzos separados.",invitation:"¿Tu acción viene de la unión con Dios o de tu solo esfuerzo?"},
{ref:"Jn 15,9",texte:"Como el Padre me ha amado, así también yo os he amado; permaneced en mi amor.",theme:"Amor de Dios",resume:"El amor de Cristo es tan grande como el amor del Padre por el Hijo.",coeur:"Este amor es inmenso, eterno, incondicional.",invitation:"Repite lentamente: Jesús me ama como el Padre lo ama."},
{ref:"Jn 15,13",texte:"Nadie tiene mayor amor que este, que uno ponga su vida por sus amigos.",theme:"Amor",resume:"La definición última del amor según Jesús.",coeur:"Jesús no habla como teórico. Vive lo que dice.",invitation:"Piensa en alguien que dio mucho por ti. Agradécele."},
{ref:"Jn 16,22",texte:"Vuestro corazón se alegrará, y nadie os quitará vuestro gozo.",theme:"Esperanza",resume:"La promesa de una alegría definitiva e indestructible.",coeur:"Nadie puede quitaros esta alegría. Está fundada en la presencia del Resucitado.",invitation:"Si estás en tristeza, afírrate a esta promesa."},
{ref:"Jn 16,33",texte:"En el mundo tendréis aflicción; pero confiad, yo he vencido al mundo.",theme:"Esperanza",resume:"La victoria de Cristo es nuestro fundamento en la prueba.",coeur:"Jesús no promete ausencia de sufrimiento. Promete su presencia victoriosa.",invitation:"Tu prueba actual no tiene la última palabra. Jesús ha vencido."},
{ref:"Jn 17,3",texte:"Y esta es la vida eterna: que te conozcan a ti, el único Dios verdadero.",theme:"Vida eterna",resume:"La vida eterna como relación de conocimiento íntimo.",coeur:"Conocer a Dios — no solo saber cosas sobre Él, sino encontrarle.",invitation:"Profundiza tu conocimiento íntimo de Dios hoy."},
{ref:"Jn 20,19",texte:"Jesús se presentó en medio de ellos, y les dijo: Paz a vosotros.",theme:"Paz",resume:"La primera palabra del Resucitado.",coeur:"Los discípulos están encerrados y asustados. Jesús traspasa sus muros.",invitation:"Deja que Jesús traspase hoy los muros de tu corazón cerrado."},
{ref:"Jn 20,27",texte:"No seas incrédulo, sino creyente.",theme:"Fe",resume:"Jesús acoge la duda de Tomás con ternura.",coeur:"Jesús no condena a Tomás por su duda. Va hacia él con sus heridas.",invitation:"Trae tus dudas a Dios. Puede transformarlas en fe."},
{ref:"Jn 21,15",texte:"Simón, hijo de Jonás, ¿me amas?",theme:"Amor",resume:"El Jesús resucitado interroga a Pedro sobre su amor.",coeur:"Después de la negación, Jesús no reprocha nada. Pregunta: ¿Me amas?",invitation:"Responde hoy a esta pregunta: ¿Me amas?"},
{ref:"Hch 1,8",texte:"Recibiréis poder, cuando haya venido sobre vosotros el Espíritu Santo, y me seréis testigos.",theme:"Misión",resume:"La misión universal animada por el Espíritu.",coeur:"No estamos solos para dar testimonio. El Espíritu nos precede y nos inspira.",invitation:"Pide al Espíritu Santo que guíe tu testimonio cotidiano hoy."},
{ref:"Hch 2,4",texte:"Y fueron todos llenos del Espíritu Santo.",theme:"Espíritu Santo",resume:"Pentecostés: el Espíritu transforma a los discípulos.",coeur:"El Espíritu puede transformar a hombres temerosos en testigos valientes.",invitation:"Pide un derramamiento del Espíritu Santo para tu vida hoy."},
{ref:"Hch 4,20",texte:"Nosotros no podemos dejar de decir lo que hemos visto y oído.",theme:"Testimonio",resume:"Pedro y Juan no pueden callar lo que han vivido con Jesús.",coeur:"El testimonio nace de una experiencia. Solo puedes compartir lo que has verdaderamente encontrado.",invitation:"Cuéntale a alguien lo que Dios ha hecho en tu vida, aunque sea brevemente."},
{ref:"Rom 5,5",texte:"La esperanza no avergüenza; porque el amor de Dios ha sido derramado en nuestros corazones.",theme:"Esperanza",resume:"El Espíritu es el garante de la esperanza cristiana.",coeur:"La esperanza cristiana se apoya en el amor de Dios derramado en nosotros.",invitation:"Renueva tu esperanza hoy. Apóyate en el amor de Dios."},
{ref:"Rom 8,1",texte:"Ninguna condenación hay para los que están en Cristo Jesús.",theme:"Libertad",resume:"La libertad radical del cristiano.",coeur:"Ninguna condenación. Esta libertad es un don.",invitation:"Si una voz te condena, respóndele con este versículo."},
{ref:"Rom 8,15",texte:"Y vosotros no recibisteis el espíritu de esclavitud para estar otra vez en temor, sino que recibisteis el espíritu de adopción.",theme:"Filiación",resume:"El Espíritu nos constituye hijos e hijas de Dios.",coeur:"El miedo es la marca de la esclavitud. La libertad es la marca de la filiación.",invitation:"Eres hijo de Dios, no esclavo."},
{ref:"Rom 8,26",texte:"El Espíritu nos ayuda en nuestra debilidad; pues qué hemos de pedir como conviene, no lo sabemos.",theme:"Oración",resume:"El Espíritu ora en nosotros cuando ya no sabemos cómo orar.",coeur:"Incluso cuando la oración es imposible, el Espíritu toma el relevo.",invitation:"Confía tu incapacidad de orar al Espíritu hoy."},
{ref:"Rom 8,28",texte:"Sabemos que a los que aman a Dios, todas las cosas les ayudan a bien.",theme:"Providencia",resume:"La Providencia divina actúa incluso en la adversidad.",coeur:"'Todas las cosas' — incluso las pruebas, los fracasos, las traiciones.",invitation:"Pide a Dios que te muestre cómo saca bien de tu situación difícil."},
{ref:"Rom 8,31",texte:"Si Dios es por nosotros, ¿quién contra nosotros?",theme:"Confianza",resume:"La certeza absoluta del amor protector de Dios.",coeur:"Nada puede prevalecer contra aquel a quien Dios sostiene.",invitation:"Recita este versículo frente a tus obstáculos actuales."},
{ref:"Rom 8,38",texte:"Ni la muerte, ni la vida... nos podrá separar del amor de Dios en Cristo Jesús.",theme:"Amor de Dios",resume:"La inseparabilidad del amor de Dios.",coeur:"Cuando todo vacila, el amor de Dios permanece.",invitation:"Lleva este versículo como un escudo en los momentos de desesperación."},
{ref:"Rom 12,2",texte:"Transformaos por medio de la renovación de vuestro entendimiento.",theme:"Conversión",resume:"La conversión es una transformación interior de la mirada.",coeur:"La transformación viene de dentro. Cambiar la manera de ver, de pensar.",invitation:"Pide el Espíritu de renovación para tu manera de pensar."},
{ref:"Rom 12,12",texte:"Gozosos en la esperanza, sufridos en la tribulación, constantes en la oración.",theme:"Vida cristiana",resume:"Tres actitudes fundamentales del cristiano ante la prueba.",coeur:"Alegría, paciencia, oración — un programa compacto de vida espiritual.",invitation:"¿Cuál de estas tres actitudes te falta más? Trabájala hoy."},
{ref:"1Cor 13,4",texte:"El amor es sufrido, es benigno; el amor no tiene envidia.",theme:"Amor",resume:"Pablo describe el verdadero amor a través de sus cualidades concretas.",coeur:"Este texto es un espejo. Sustituye 'amor' por tu nombre.",invitation:"Lee 1Cor 13 lentamente sustituyendo 'amor' por tu nombre."},
{ref:"1Cor 13,13",texte:"Y ahora permanecen la fe, la esperanza y el amor, estos tres; pero el mayor de ellos es el amor.",theme:"Amor",resume:"Las tres virtudes teologales con la primacía del amor.",coeur:"Solo el amor permanece para la eternidad.",invitation:"Haz un acto gratuito de amor hoy, sin esperar nada a cambio."},
{ref:"2Cor 4,16",texte:"Aunque este nuestro hombre exterior se va desgastando, el interior no obstante se renueva de día en día.",theme:"Esperanza",resume:"La renovación interior a pesar del deterioro exterior.",coeur:"El Espíritu renueva por dentro incluso cuando el exterior se deteriora.",invitation:"Cuida tu vida interior con un tiempo de oración y silencio."},
{ref:"2Cor 5,17",texte:"Si alguno está en Cristo, nueva criatura es.",theme:"Conversión",resume:"En Cristo comienza una nueva creación.",coeur:"No estás condenado a seguir siendo lo que eres. En Cristo hay un comienzo perpetuo.",invitation:"Recibe tu identidad de nueva criatura hoy."},
{ref:"2Cor 12,9",texte:"Bástate mi gracia; porque mi poder se perfecciona en la debilidad.",theme:"Debilidad",resume:"El poder de Dios se manifiesta en nuestra debilidad.",coeur:"Dios elige nuestras grietas para desplegar su poder.",invitation:"Ofrece tu principal debilidad a Dios como lugar de su poder."},
{ref:"Gál 2,20",texte:"Ya no vivo yo, mas vive Cristo en mí.",theme:"Unión con Dios",resume:"La vida cristiana como participación en la vida de Cristo.",coeur:"Este giro es el corazón de la vida cristiana.",invitation:"Medita esta frase al despertar: Ya no vivo yo, sino Cristo."},
{ref:"Gál 5,22",texte:"El fruto del Espíritu es: amor, gozo, paz, paciencia, benignidad, bondad, mansedumbre.",theme:"Espíritu Santo",resume:"Los frutos visibles de una vida habitada por Dios.",coeur:"Estos frutos no se obtienen por esfuerzo. Vienen del Espíritu.",invitation:"¿Cuál de estos frutos falta en tu vida? Pídelo al Espíritu Santo."},
{ref:"Ef 2,8",texte:"Porque por gracia sois salvos por medio de la fe; y esto no de vosotros, pues es don de Dios.",theme:"Gracia",resume:"La salvación es enteramente un don gratuito de Dios.",coeur:"No ganamos nuestra salvación. La recibimos.",invitation:"Da gracias por lo que no has merecido."},
{ref:"Ef 3,17",texte:"Para que habite Cristo por la fe en vuestros corazones, a fin de que arraigados y cimentados en amor.",theme:"Unión con Dios",resume:"Pablo ora para que Cristo se establezca profundamente en los corazones.",coeur:"Un árbol profundamente arraigado resiste las tormentas.",invitation:"Verifica la profundidad de tus raíces espirituales."},
{ref:"Ef 4,32",texte:"Antes sed benignos unos con otros, misericordiosos, perdonándoos unos a otros, como Dios también os perdonó en Cristo.",theme:"Perdón",resume:"El modelo del perdón cristiano es el mismo perdón de Dios.",coeur:"Perdonar como Dios perdona — sin condiciones, sin cálculo, por puro amor.",invitation:"Perdona hoy a alguien como Dios te ha perdonado."},
{ref:"Flp 4,4",texte:"Regocijaos en el Señor siempre. Otra vez digo: ¡Regocijaos!",theme:"Alegría",resume:"Pablo ordena la alegría como postura espiritual.",coeur:"La alegría cristiana es una orientación del alma hacia Dios.",invitation:"Elige la alegría hoy. La alegría profunda anclada en Dios."},
{ref:"Flp 4,6",texte:"Por nada estéis afanosos, sino sean conocidas vuestras peticiones delante de Dios en toda oración.",theme:"Oración",resume:"Pablo propone la oración como antídoto para la ansiedad.",coeur:"Transforma cada preocupación en oración.",invitation:"Elige una de tus preocupaciones y transfórmala en una oración concreta ahora."},
{ref:"Flp 4,7",texte:"Y la paz de Dios, que sobrepasa todo entendimiento, guardará vuestros corazones.",theme:"Paz",resume:"La paz divina supera toda comprensión humana.",coeur:"Esta paz no depende de las circunstancias. Viene de Dios.",invitation:"Pide esta paz que sobrepasa el entendimiento."},
{ref:"Flp 4,13",texte:"Todo lo puedo en Cristo que me fortalece.",theme:"Fuerza",resume:"Pablo expresa su confianza absoluta en la fuerza que Cristo le da.",coeur:"No: puedo todo por mi voluntad. Sino: en Aquel que me fortalece.",invitation:"Enfrenta tu reto del día con esta confianza."},
{ref:"Col 3,16",texte:"La palabra de Cristo more en abundancia en vosotros.",theme:"Palabra",resume:"La invitación a dejar que la Palabra habite abundantemente nuestra vida interior.",coeur:"La Palabra está hecha para habitar nuestros corazones e inspirar nuestros actos.",invitation:"Elige un versículo para memorizar esta semana. Déjalo habitarte."},
{ref:"1Tes 5,16",texte:"Estad siempre gozosos.",theme:"Alegría",resume:"La exhortación más corta de Pablo.",coeur:"La alegría no está reservada para los días felices. Es una decisión espiritual.",invitation:"Toma la decisión consciente de la alegría hoy."},
{ref:"1Tes 5,17",texte:"Orad sin cesar.",theme:"Oración",resume:"La oración continua como atmósfera de la vida cristiana.",coeur:"Orar sin cesar es vivir en una conversación interior continua con Dios.",invitation:"Adopta una fórmula corta de oración para repetir a lo largo del día."},
{ref:"1Tes 5,18",texte:"Dad gracias en todo, porque esta es la voluntad de Dios para con vosotros en Cristo Jesús.",theme:"Gratitud",resume:"La acción de gracias en toda circunstancia.",coeur:"Dar gracias en la prueba no es resignación. Es fe que afirma que Dios puede sacar bien de todo.",invitation:"Da gracias por algo difícil que estás atravesando."},
{ref:"Heb 4,12",texte:"La palabra de Dios es viva y eficaz, y más cortante que toda espada de dos filos.",theme:"Palabra",resume:"La Palabra de Dios es viva y poderosa.",coeur:"La Palabra no es un texto inerte. Está viva. Actúa.",invitation:"Lee un pasaje de la Escritura hoy, dándole tiempo de actuar en ti."},
{ref:"Heb 11,1",texte:"Es pues la fe la certeza de lo que se espera, la convicción de lo que no se ve.",theme:"Fe",resume:"La definición clásica de la fe.",coeur:"La fe versa sobre lo que aún no vemos, pero que es más real que lo que vemos.",invitation:"¿En qué se apoya tu fe hoy? Fortalece ese fundamento."},
{ref:"Heb 13,8",texte:"Jesucristo es el mismo ayer, y hoy, y por los siglos.",theme:"Fidelidad",resume:"La inmutabilidad de Cristo como fundamento de la fe.",coeur:"Todo cambia. Pero Jesucristo no cambia. Su fidelidad es absoluta.",invitation:"Apóyate en la fidelidad inmutable de Cristo hoy."},
{ref:"Sant 1,17",texte:"Toda buena dádiva y todo don perfecto desciende de lo alto.",theme:"Gratitud",resume:"Todo bien recibido viene de Dios.",coeur:"Nada bueno es fruto del mero azar. Todo bien es un regalo de lo alto.",invitation:"Haz una lista de tres dones en tu vida. Agradece al donante."},
{ref:"Sant 4,8",texte:"Acercaos a Dios, y él se acercará a vosotros.",theme:"Oración",resume:"La reciprocidad del movimiento hacia Dios.",coeur:"Dios respeta nuestra libertad. Cada paso hacia Él es recibido y acompañado.",invitation:"Da un paso concreto hacia Dios hoy."},
{ref:"1Pe 1,8",texte:"A quien amáis sin haberle visto, en quien creyendo, aunque ahora no lo veáis, os alegráis.",theme:"Fe",resume:"La fe que ama sin ver.",coeur:"No hemos visto a Jesús. Y sin embargo lo amamos. Esta fe es una gracia extraordinaria.",invitation:"Deja que este amor suba en ti por Aquel que no has visto."},
{ref:"1Pe 5,7",texte:"Echad toda vuestra ansiedad sobre él, porque él tiene cuidado de vosotros.",theme:"Confianza",resume:"Dios cuida de nosotros.",coeur:"Una atención personal, tierna, continua.",invitation:"Confía a Dios cada preocupación que llevas ahora mismo."},
{ref:"1Jn 1,9",texte:"Si confesamos nuestros pecados, él es fiel y justo para perdonar nuestros pecados.",theme:"Perdón",resume:"La confesión sincera es acogida por la fidelidad de Dios.",coeur:"Su perdón se apoya en nuestra honestidad con Él, no en nuestra perfección.",invitation:"Reconoce honestamente ante Dios lo que pesa en tu conciencia. Recibe su perdón."},
{ref:"1Jn 3,1",texte:"Mirad cuál amor nos ha dado el Padre, para que seamos llamados hijos de Dios. ¡Y lo somos!",theme:"Filiación",resume:"El asombro de Juan ante nuestra dignidad de hijos e hijas de Dios.",coeur:"¡Y lo somos! No solo llamados — lo somos realmente.",invitation:"Contempla tu identidad de hijo de Dios. Deja que ese asombro te toque."},
{ref:"1Jn 4,8",texte:"El que no ama, no ha conocido a Dios; porque Dios es amor.",theme:"Amor",resume:"La ecuación fundamental: Dios es amor.",coeur:"Dios no tiene el amor como un atributo entre otros. Él ES amor.",invitation:"Medita: Dios es amor. ¿Qué cambia eso en tu imagen de Dios?"},
{ref:"1Jn 4,18",texte:"El amor perfecto echa fuera el temor.",theme:"Amor",resume:"El amor perfecto libera de todo temor.",coeur:"El amor es la sanación del miedo.",invitation:"Pide al amor de Dios que eche fuera un miedo que vive en tu corazón."},
{ref:"1Jn 4,19",texte:"Nosotros le amamos a él, porque él nos amó primero.",theme:"Amor",resume:"Nuestro amor es una respuesta a la iniciativa de Dios.",coeur:"El amor de Dios es la fuente, no la recompensa.",invitation:"Deja que el amor de Dios inspire tu amor hacia los demás."},
{ref:"Ap 3,20",texte:"He aquí, yo estoy a la puerta y llamo.",theme:"Presencia",resume:"Jesús a la puerta del corazón.",coeur:"Jesús no fuerza las puertas. Llama. Espera. Respeta tu libertad.",invitation:"Abre la puerta a Jesús hoy."},
{ref:"Ap 21,4",texte:"Enjugará Dios toda lágrima de los ojos de ellos; y ya no habrá muerte, ni habrá más llanto.",theme:"Esperanza",resume:"La promesa de una vida sin lágrimas ni muerte.",coeur:"Toda lágrima será enjugada. No ignorada — enjugada, con ternura.",invitation:"Si llevas un dolor, ofréceselo a Dios con esta promesa."},
{ref:"Ap 22,20",texte:"¡Ven, Señor Jesús!",theme:"Esperanza",resume:"La oración final de la Biblia.",coeur:"Estas tres palabras resumen toda la espiritualidad cristiana.",invitation:"Ora estas tres palabras con todo tu corazón: ¡Ven, Señor Jesús!"}
