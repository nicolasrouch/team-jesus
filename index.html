<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marche avec Jésus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Marche avec Jésus">
<meta name="theme-color" content="#a07840">
<meta property="og:title" content="Marche avec Jésus">
<meta property="og:description" content="Pose ta question intérieure et reçois une réponse dans la Parole de Dieu">
<meta property="og:image" content="https://nicolasrouch.github.io/team-jesus/icon-512.png">
<meta property="og:url" content="https://nicolasrouch.github.io/team-jesus/">
<meta name="twitter:card" content="summary_large_image">
<script data-goatcounter="https://rouch.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>


  :root {
    --or: #a07840;
    --or-clair: #7a5a20;
    --brun: #1a0f05;
    --creme: #f5efe4;
    --creme-fonce: #ede3d0;
    --gris: #3a3028;
    --texte-sombre: #0a0500;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: #fff;
  }

  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ══ PAGES ══ */
  .page {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    min-height: 100vh;
    padding: 3rem 1.5rem 2rem;
    animation: fadeIn 0.8s ease;
  }
  .page.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══ PAGE 1 ══ */
  #page1 {
    background: #ffffff;
    color: var(--texte-sombre);
    justify-content: center;
  }

  #page1 .btn-page1 {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 1rem;
    background: transparent;
    border: 1px solid var(--or);
    color: var(--brun);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    white-space: nowrap;
  }
  #page1 .btn-page1:hover {
    background: rgba(201,169,110,0.12);
  }

  /* ══ PAGES 2 & 3 ══ */
  #page2, #page3 {
    background: #ffffff;
    color: var(--texte-sombre);
  }

  /* Ornement */
  .ornement {
    color: var(--or);
    font-size: 1rem;
    letter-spacing: 0.8rem;
    margin-bottom: 1.8rem;
    opacity: 0.8;
  }

  /* Séparateur */
  .sep {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--or), transparent);
    margin: 1.2rem auto;
  }

  /* Sous-titre page 2 */
  .sous-titre {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gris);
    opacity: 0.7;
    margin-bottom: 1.5rem;
  }

  /* Référence */
  .verset-ref {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--or);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
  }

  /* Texte verset */
  .verset-texte {
    font-size: 1.3rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.9;
    color: #0a0500;
    padding: 1.2rem 1.5rem;
    border-left: 2px solid var(--or);
    text-align: left;
    margin-bottom: 1rem;
  }

  /* Thème */
  .verset-theme {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--or);
    opacity: 0.7;
    margin-bottom: 2rem;
  }

  /* Texte d'invitation */
  .intro {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.9;
    color: #1a1208;
    margin-bottom: 2rem;
    font-style: italic;
  }

  /* Bouton principal */
  .btn {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.85rem 2.2rem;
    background: transparent;
    border: 1px solid var(--or);
    color: var(--brun);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  .btn:hover {
    background: rgba(201,169,110,0.12);
    border-color: var(--brun);
  }

  /* Blocs méditation */
  .meditation-bloc {
    width: 100%;
    text-align: left;
    margin-bottom: 1.2rem;
    padding: 1rem 1.2rem;
    border: 1px solid rgba(201,169,110,0.25);
    background: rgba(201,169,110,0.04);
  }
  .meditation-titre {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--or);
    opacity: 0.8;
    margin-bottom: 0.6rem;
  }
  .meditation-texte {
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.75;
    color: #1a1208;
  }

  /* Boutons liens */
  .btns-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1.5rem;
  }
  .btn-lien {
    background: none;
    border: none;
    color: var(--gris);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    padding: 0.3rem 0.5rem;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .btn-lien:hover { color: var(--brun); }

  .lang-selector {
    position: fixed;
    top: 1rem;
    right: 1rem;
    display: flex;
    gap: 0.4rem;
    z-index: 100;
  }
  .lang-btn {
    background: none;
    border: 1px solid #a07840;
    color: #000000;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    opacity: 0.55;
    transition: all 0.2s;
    font-weight: 600;
  }
  .lang-btn.active { opacity: 1; background: rgba(160,120,64,0.12); font-weight: 700; }
  .lang-btn:hover { opacity: 1; }

  /* ══ LAYOUT GLOBAL ══ */
  body { overflow: hidden; }
  .app { position: relative; }

  /* ══ MENU HAMBURGER ══ */
  .hamburger {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 200;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: #000;
    transition: all 0.3s;
  }

  /* ══ DRAWER MENU ══ */
  .drawer {
    position: fixed;
    top: 0;
    left: -100%;
    width: 80%;
    max-width: 320px;
    height: 100vh;
    background: #fff;
    z-index: 300;
    transition: left 0.3s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    padding: 2rem 1.5rem;
    overflow-y: auto;
  }
  .drawer.open { left: 0; }
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 250;
    display: none;
  }
  .drawer-overlay.open { display: block; }

  .drawer-title {
    font-family: 'IM Fell English', serif;
    font-size: 1.4rem;
    color: #000;
    margin-bottom: 0.3rem;
  }
  .drawer-sep {
    width: 40px;
    height: 1px;
    background: #a07840;
    margin: 0.8rem 0 1.5rem;
  }
  .drawer-btn {
    background: none;
    border: none;
    text-align: left;
    padding: 1rem 0;
    border-bottom: 1px solid rgba(160,120,64,0.2);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: #000;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .drawer-btn:hover { color: #a07840; }
  .drawer-btn .icon { font-size: 1.3rem; }
  .drawer-close {
    margin-top: auto;
    background: none;
    border: 1px solid rgba(160,120,64,0.4);
    padding: 0.7rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    color: #555;
    cursor: pointer;
    letter-spacing: 0.1em;
  }

  /* ══ SÉLECTEUR LANGUE ══ */
  .lang-selector {
    position: fixed;
    top: 1rem;
    right: 1rem;
    display: flex;
    gap: 0.3rem;
    z-index: 200;
  }
  .lang-btn {
    background: none;
    border: 1px solid #a07840;
    color: #000;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.5rem;
    cursor: pointer;
    opacity: 0.5;
    transition: all 0.2s;
    font-weight: 600;
  }
  .lang-btn.active { opacity: 1; background: rgba(160,120,64,0.1); }
  .lang-btn:hover { opacity: 1; }

  /* ══ COMPTEUR QUESTIONS ══ */
  .compteur-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid rgba(160,120,64,0.2);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 150;
    font-family: 'Cormorant Garamond', serif;
  }
  .compteur-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid #a07840;
    background: transparent;
    transition: background 0.3s;
  }
  .dot.used { background: #a07840; }
  .dot.locked { border-color: #ccc; }
  .compteur-label {
    font-size: 0.8rem;
    color: #000;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .btn-subscribe {
    background: #a07840;
    color: #fff;
    border: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  /* ══ PAGE PRIÈRE DU JOUR ══ */
  #page-priere {
    background: #fff;
    color: #000;
    justify-content: center;
    padding-bottom: 5rem;
  }
  .priere-texte {
    font-size: 1.15rem;
    font-weight: 400;
    font-style: italic;
    line-height: 2;
    color: #000;
    text-align: center;
    padding: 1.5rem;
    border: 1px solid rgba(160,120,64,0.2);
    background: rgba(160,120,64,0.03);
    margin: 1rem 0 2rem;
  }
  .date-badge {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #a07840;
    margin-bottom: 1rem;
    font-weight: 600;
  }

  /* ══ PAGE MES VERSETS ══ */
  #page-versets {
    background: #fff;
    color: #000;
    justify-content: flex-start;
    padding-top: 4rem;
    padding-bottom: 5rem;
  }
  .verset-sauvegarde {
    width: 100%;
    text-align: left;
    margin-bottom: 1rem;
    padding: 1rem 1.2rem;
    border: 1px solid rgba(160,120,64,0.25);
    background: rgba(160,120,64,0.04);
  }
  .verset-sauvegarde .ref {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: #a07840;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .verset-sauvegarde .texte {
    font-size: 1rem;
    font-style: italic;
    color: #000;
    line-height: 1.7;
    font-weight: 400;
  }
  .empty-msg {
    font-style: italic;
    color: #555;
    font-size: 1rem;
    text-align: center;
    margin-top: 2rem;
    line-height: 1.8;
    font-weight: 400;
  }

  /* ══ ÉCRAN LIMITE ══ */
  #page-limite {
    background: #fff;
    color: #000;
    justify-content: center;
  }
  .limite-msg {
    font-size: 1.05rem;
    font-style: italic;
    line-height: 1.9;
    color: #000;
    text-align: center;
    margin: 1.5rem 0;
    font-weight: 400;
  }

  /* Ajustement pages avec barre du bas */
  #page1, #page2, #page3 {
    padding-bottom: 5rem;
  }
</style>
</head>
<body>

<!-- HAMBURGER -->
<button class="hamburger" onclick="openDrawer()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>

<!-- LANGUE -->
<div class="lang-selector">
  <button class="lang-btn active" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
  <button class="lang-btn" onclick="setLang('it')">IT</button>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title" id="drawer-titre">Marche avec Jésus</div>
  <div class="drawer-sep"></div>
  <button class="drawer-btn" onclick="showPage('page1'); closeDrawer()">
    <span class="icon">🕯️</span> <span id="menu-accueil">Accueil</span>
  </button>
  <button class="drawer-btn" onclick="showPriere(); closeDrawer()">
    <span class="icon">🙏</span> <span id="menu-priere">Prière du jour</span>
  </button>
  <button class="drawer-btn" onclick="showVersets(); closeDrawer()">
    <span class="icon">📖</span> <span id="menu-versets">Mes versets du jour</span>
  </button>
  <button class="drawer-close" onclick="closeDrawer()" id="menu-fermer">✕ Fermer</button>
</div>

<!-- APP -->
<div class="app">

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <h1 id="app-titre" style="font-family:'IM Fell English',Georgia,serif;font-size:1.8rem;font-weight:400;color:#000;margin-bottom:1.2rem;letter-spacing:0.05em;"></h1>
    <div class="ornement">✦ ✝ ✦</div>
    <div style="font-size:2.5rem;margin-bottom:1.5rem;">🕯️</div>
    <div class="sep"></div>
    <p id="app-sous-titre" style="font-family:'IM Fell English',Georgia,serif;font-size:1.15rem;font-style:italic;color:#000;margin-bottom:1rem;letter-spacing:0.05em;"></p>
    <p class="intro" id="app-intro" style="color:#000;"></p>
    <button class="btn-page1" id="app-btn-pret" onclick="demanderVerset()" style="color:#000;"></button>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="ornement">✦ ✝ ✦</div>
    <p class="sous-titre" id="app-parole-repond" style="color:#000;opacity:1;font-weight:600;"></p>
    <div class="verset-ref" id="verset-ref"></div>
    <div class="verset-texte" id="verset-texte" style="color:#000;"></div>
    <div class="verset-theme" id="verset-theme"></div>
    <p class="intro" id="app-lire" style="color:#000;"></p>
    <button class="btn" id="app-btn-mediter" onclick="allerPage3()" style="color:#000;"></button>
    <div class="btns-row">
      <button class="btn-lien" id="app-retour" onclick="showPage('page1')" style="color:#000;"></button>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <div class="ornement">✦ ✝ ✦</div>
    <div class="verset-ref" id="med-ref" style="margin-bottom:1.5rem;"></div>
    <div class="meditation-bloc">
      <div class="meditation-titre" id="app-titre-resume"></div>
      <div class="meditation-texte" id="med-resume" style="color:#000;"></div>
    </div>
    <div class="meditation-bloc">
      <div class="meditation-titre" id="app-titre-coeur"></div>
      <div class="meditation-texte" id="med-coeur" style="color:#000;"></div>
    </div>
    <div class="meditation-bloc">
      <div class="meditation-titre" id="app-titre-invitation"></div>
      <div class="meditation-texte" id="med-invitation" style="color:#000;"></div>
    </div>
    <div class="btns-row">
      <button class="btn-lien" id="app-relire" onclick="showPage('page2')" style="color:#000;"></button>
    </div>
  </div>

  <!-- PAGE LIMITE -->
  <div class="page" id="page-limite">
    <div class="ornement">✦ ✝ ✦</div>
    <div class="bougie" style="font-size:2.5rem;margin-bottom:1.5rem;">🕯️</div>
    <div class="sep"></div>
    <p class="limite-msg" id="limite-msg"></p>
    <button class="btn" id="btn-abonner" onclick="allerAbonnement()" style="color:#000;margin-bottom:1rem;"></button>
    <button class="btn-lien" onclick="showPage('page1')" id="btn-retour-limite" style="color:#000;margin-top:0.5rem;"></button>
  </div>

  <!-- PAGE PRIÈRE DU JOUR -->
  <div class="page" id="page-priere">
    <div class="ornement">✦ ✝ ✦</div>
    <h2 id="priere-titre" style="font-family:'IM Fell English',serif;font-size:1.5rem;font-weight:400;color:#000;margin-bottom:0.5rem;"></h2>
    <div class="sep"></div>
    <p class="date-badge" id="priere-date"></p>
    <div class="priere-texte" id="priere-texte"></div>
    <button class="btn-lien" onclick="showPage('page1')" id="btn-retour-priere" style="color:#000;"></button>
  </div>

  <!-- PAGE MES VERSETS -->
  <div class="page" id="page-versets">
    <div class="ornement" style="margin-top:1rem;">✦ ✝ ✦</div>
    <h2 id="versets-titre" style="font-family:'IM Fell English',serif;font-size:1.5rem;font-weight:400;color:#000;margin-bottom:0.5rem;text-align:center;"></h2>
    <div class="sep"></div>
    <div id="versets-liste" style="width:100%;margin-top:1rem;"></div>
    <button class="btn-lien" onclick="showPage('page1')" id="btn-retour-versets" style="color:#000;margin-top:1rem;"></button>
  </div>

</div>

<!-- BARRE DU BAS -->
<div class="compteur-bar" id="compteur-bar">
  <div style="display:flex;flex-direction:column;gap:3px;">
    <div class="compteur-dots" id="compteur-dots"></div>
    <span class="compteur-label" id="compteur-label"></span>
  </div>
  <button class="btn-subscribe" id="btn-sub-bar" onclick="allerAbonnement()"></button>
</div>

<script>
// ══════════════════════════════
// UI TRANSLATIONS
// ══════════════════════════════

// ══ MATTHIEU ══
{ref:"Mt 5,3",texte:"Heureux les pauvres de cœur, car le Royaume des Cieux est à eux.",theme:"Béatitudes",resume:"Jésus inaugure son enseignement en révélant que le vrai bonheur appartient à ceux qui reconnaissent leur pauvreté intérieure devant Dieu.",coeur:"La pauvreté de cœur n'est pas un manque mais une ouverture. C'est l'espace vide en nous que Dieu peut remplir. Reconnaître notre besoin de Lui est le premier pas vers la plénitude.",invitation:"Aujourd'hui, laissez tomber une prétention ou une certitude. Accueillez votre manque comme une porte."},
{ref:"Mt 5,4",texte:"Heureux ceux qui pleurent, car ils seront consolés.",theme:"Béatitudes",resume:"Dieu ne fuit pas notre douleur. Il s'approche de ceux qui portent un deuil, une peine, une blessure.",coeur:"Pleurer devant Dieu n'est pas une faiblesse. C'est une prière. Les larmes creusent en nous un espace que Dieu vient habiter de sa présence douce et fidèle.",invitation:"Si vous portez une peine, ne la cachez pas à Dieu aujourd'hui. Parlez-Lui de ce qui vous fait mal."},
{ref:"Mt 5,5",texte:"Heureux les doux, car ils hériteront la terre.",theme:"Béatitudes",resume:"La douceur évangélique n'est pas faiblesse mais force intérieure.",coeur:"La douceur est la puissance du cœur transformé. Elle désarme la violence, elle ouvre des portes fermées. Dieu lui-même est doux et humble de cœur.",invitation:"Faites un geste de douceur inattendu envers quelqu'un qui vous a blessé."},
{ref:"Mt 5,6",texte:"Heureux ceux qui ont faim et soif de la justice, car ils seront rassasiés.",theme:"Béatitudes",resume:"Le désir ardent de justice n'est pas vain. Dieu promet de le combler pleinement.",coeur:"Cette faim de justice est sainte. Elle vient de Dieu Lui-même. Là où vous sentez en vous une soif de bien, de vérité — c'est Dieu qui travaille.",invitation:"Nourrissez aujourd'hui votre faim spirituelle : un temps de prière, une lecture, un acte de justice."},
{ref:"Mt 5,7",texte:"Heureux les miséricordieux, car ils obtiendront miséricorde.",theme:"Béatitudes",resume:"La miséricorde que nous donnons revient vers nous. C'est une loi du Royaume.",coeur:"Pardonner est difficile. Mais la miséricorde n'est pas d'abord un sentiment — c'est un choix libre. Et chaque fois que nous pardonnons, nous recevons quelque chose de Dieu.",invitation:"Y a-t-il quelqu'un à qui vous pourriez accorder votre pardon aujourd'hui, même intérieurement ?"},
{ref:"Mt 5,8",texte:"Heureux les cœurs purs, car ils verront Dieu.",theme:"Béatitudes",resume:"La pureté du cœur est une simplicité intérieure qui permet de voir Dieu partout.",coeur:"Un cœur pur n'est pas un cœur sans blessure. C'est un cœur sans double fond, sans masque. Un cœur qui cherche Dieu avec sincérité.",invitation:"Vérifiez aujourd'hui l'intention derrière vos actes. Agissez-vous par amour ou par peur du regard des autres ?"},
{ref:"Mt 5,9",texte:"Heureux ceux qui font œuvre de paix, car ils seront appelés fils de Dieu.",theme:"Béatitudes",resume:"La paix n'est pas l'absence de conflit, c'est une œuvre active de réconciliation.",coeur:"Faire la paix, c'est imiter Dieu Lui-même. C'est risquer de se mettre entre deux feux pour que cesse la blessure. Ceux qui osent cela portent en eux quelque chose de divin.",invitation:"Cherchez une situation tendue autour de vous. Que pouvez-vous faire, même petit, pour y semer la paix ?"},
{ref:"Mt 5,14",texte:"Vous êtes la lumière du monde. Une ville située sur une montagne ne peut être cachée.",theme:"Mission",resume:"Jésus confie à ses disciples une identité lumineuse. Ils sont appelés à briller par leur vie.",coeur:"Vous êtes lumière — non par vos mérites, mais parce que Dieu vous a touchés. Cette lumière n'est pas à garder pour vous. Elle est faite pour être posée haut.",invitation:"Laissez quelqu'un voir aujourd'hui quelque chose de beau en vous, sans vous en excuser."},
{ref:"Mt 5,16",texte:"Que votre lumière brille ainsi devant les hommes : alors, voyant ce que vous faites de bien, ils rendront gloire à votre Père qui est aux cieux.",theme:"Mission",resume:"Le rayonnement de nos actes est un chemin pour que les autres rencontrent Dieu.",coeur:"Nos actes de bonté ne nous appartiennent pas vraiment. Ils sont des fenêtres par lesquelles la lumière de Dieu passe dans le monde.",invitation:"Faites aujourd'hui une bonne action sans la raconter. Laissez Dieu en être la seule récompense."},
{ref:"Mt 5,44",texte:"Moi, je vous dis : Aimez vos ennemis, et priez pour ceux qui vous persécutent.",theme:"Amour",resume:"Le commandement le plus radical de Jésus : aimer jusqu'à l'ennemi.",coeur:"Aimer l'ennemi n'est pas naturel. C'est une grâce. Cela suppose d'avoir été soi-même aimé gratuitement pour pouvoir aimer ainsi.",invitation:"Priez aujourd'hui pour quelqu'un qui vous a fait du mal. Même une courte prière."},
{ref:"Mt 6,3",texte:"Mais toi, quand tu fais l'aumône, que ta main gauche ignore ce que fait ta main droite.",theme:"Humilité",resume:"La discrétion dans le bien : agir sans chercher la reconnaissance.",coeur:"L'action cachée est l'action la plus libre. Elle n'attend rien en retour. Elle est faite pour Dieu seul.",invitation:"Faites aujourd'hui un bien que personne ne saura jamais."},
{ref:"Mt 6,6",texte:"Toi, quand tu pries, retire-toi dans ta chambre, ferme la porte, et prie ton Père qui est là dans le secret.",theme:"Prière",resume:"Jésus invite à une prière intime, secrète, loin de tout spectacle.",coeur:"La chambre intérieure est un lieu que personne ne peut envahir. C'est là que Dieu vous attend. Il n'a pas besoin de beaux discours — il veut votre présence.",invitation:"Accordez-vous aujourd'hui 5 minutes seul(e) avec Dieu. Pas de mots nécessaires. Juste être là."},
{ref:"Mt 6,9",texte:"Vous donc, priez ainsi : Notre Père qui es aux cieux, que ton nom soit sanctifié.",theme:"Prière",resume:"Jésus nous enseigne à nous adresser à Dieu comme à un Père, avec confiance et révérence.",coeur:"Dire 'Notre Père' change tout. Ce n'est pas un Dieu lointain et froid. C'est un Père qui nous connaît, nous aime, et nous attend.",invitation:"Priez le Notre Père aujourd'hui très lentement, en pesant chaque mot."},
{ref:"Mt 6,21",texte:"Car là où est ton trésor, là aussi sera ton cœur.",theme:"Liberté intérieure",resume:"Jésus révèle le lien profond entre ce que nous aimons et ce que nous devenons.",coeur:"Où est votre attention ? Vos désirs ? Ce que vous cherchez avec ardeur façonne votre cœur. Dieu invite à placer notre trésor là où il ne rouille pas.",invitation:"Faites l'inventaire de votre temps. Qu'est-ce qui occupe vraiment votre cœur cette semaine ?"},
{ref:"Mt 6,25",texte:"C'est pourquoi je vous dis : Ne vous faites pas de souci pour votre vie.",theme:"Confiance",resume:"Jésus libère ses disciples du joug de l'inquiétude en leur rappelant la tendresse providentielle du Père.",coeur:"L'inquiétude est souvent un manque de confiance déguisé. Jésus ne dit pas d'ignorer les difficultés — il dit de les confier à Celui qui prend soin des oiseaux du ciel.",invitation:"Nommez votre principale inquiétude du moment. Remettez-la explicitement à Dieu dans une prière courte."},
{ref:"Mt 6,33",texte:"Cherchez d'abord le Royaume de Dieu et sa justice, et tout cela vous sera donné par surcroît.",theme:"Confiance",resume:"Une promesse de pourvoir à tous nos besoins si nous mettons Dieu au premier plan.",coeur:"Chercher le Royaume en premier, c'est réorienter toute sa vie. Ce n'est pas abandonner ses responsabilités — c'est les vivre dans une autre lumière.",invitation:"Commencez votre journée demain par un temps de prière avant toute chose."},
{ref:"Mt 7,7",texte:"Demandez, on vous donnera ; cherchez, vous trouverez ; frappez, on vous ouvrira.",theme:"Prière",resume:"Jésus encourage une persévérance confiante dans la prière.",coeur:"Dieu n'est pas avare. Il ne se cache pas derrière des portes fermées pour tester notre persévérance. Il attend notre demande pour se donner davantage.",invitation:"Y a-t-il une prière que vous avez abandonnée ? Reprenez-la aujourd'hui."},
{ref:"Mt 7,12",texte:"Tout ce que vous voulez que les hommes fassent pour vous, faites-le vous-mêmes pour eux.",theme:"Amour du prochain",resume:"La règle d'or : un résumé de toute la loi morale en une phrase.",coeur:"Cette règle est simple mais révolutionnaire. Elle place l'autre au centre. Elle suppose que je suis capable de sortir de moi-même pour me mettre à la place de l'autre.",invitation:"Avant d'agir envers quelqu'un aujourd'hui, demandez-vous : est-ce ce que je voudrais qu'on me fasse ?"},
{ref:"Mt 9,36",texte:"Voyant les foules, Jésus fut saisi de compassion envers elles, parce qu'elles étaient fatiguées et abattues.",theme:"Compassion",resume:"Le cœur de Jésus se laisse toucher par la détresse des hommes.",coeur:"Jésus ne reste pas à distance. Il se laisse atteindre. Sa compassion n'est pas de la pitié froide — elle est un mouvement viscéral vers l'autre.",invitation:"Regardez aujourd'hui les gens autour de vous avec les yeux de la compassion plutôt que du jugement."},
{ref:"Mt 11,28",texte:"Venez à moi, vous tous qui peinez et ployez sous le fardeau, et moi je vous donnerai le repos.",theme:"Repos",resume:"Une invitation universelle au repos pour tous ceux qui sont épuisés.",coeur:"Jésus n'exige pas que vous arriviez frais et dispos. Il vous accueille dans votre fatigue même. Le repos qu'il offre n'est pas l'absence d'effort mais la paix profonde.",invitation:"Apportez à Jésus aujourd'hui ce qui vous pèse le plus. Posez-le à ses pieds."},
{ref:"Mt 11,29",texte:"Prenez sur vous mon joug, devenez mes disciples, car je suis doux et humble de cœur, et vous trouverez le repos.",theme:"Repos",resume:"Le joug du Christ n'est pas un fardeau supplémentaire mais une libération.",coeur:"La douceur et l'humilité de Jésus ne sont pas des faiblesses — elles sont la forme de sa puissance. Être disciple de quelqu'un de doux, c'est apprendre une autre façon d'exister.",invitation:"Imitez aujourd'hui la douceur de Jésus dans une situation où vous seriez tenté(e) de réagir durement."},
{ref:"Mt 13,44",texte:"Le Royaume des cieux est semblable à un trésor caché dans un champ.",theme:"Royaume",resume:"La joie de trouver le Royaume dépasse tout autre bien.",coeur:"Avez-vous découvert ce trésor ? Ce moment où vous avez senti que Dieu était réel, proche, précieux ? Ce moment mérite d'être chéri.",invitation:"Remémorez-vous un moment de grâce dans votre vie. Rendez grâce pour ce trésor."},
{ref:"Mt 14,27",texte:"Courage ! C'est moi ; n'ayez pas peur.",theme:"Confiance",resume:"Jésus vient à la rencontre des disciples sur les eaux et les rassure.",coeur:"Dans la tempête de la nuit, Jésus vient. Sa première parole est : Courage. Sa deuxième : C'est moi. Sa troisième : N'ayez pas peur.",invitation:"Entendez Jésus vous dire aujourd'hui : Courage, c'est moi, n'aie pas peur."},
{ref:"Mt 18,3",texte:"En vérité je vous le dis : si vous ne changez pas pour devenir comme des enfants, vous n'entrerez pas dans le Royaume des cieux.",theme:"Enfance spirituelle",resume:"La conversion nécessaire vers la simplicité enfantine.",coeur:"L'enfant reçoit sans mériter. Il fait confiance sans calculer. Il s'abandonne sans peur. Voilà le cœur de la vie spirituelle.",invitation:"Approchez-vous de Dieu aujourd'hui avec la simplicité d'un enfant. Sans performance, sans préparation."},
{ref:"Mt 18,20",texte:"Car là où deux ou trois sont réunis en mon nom, je suis au milieu d'eux.",theme:"Communauté",resume:"La présence du Christ est garantie même dans les petits rassemblements.",coeur:"Deux ou trois. Pas besoin d'une cathédrale pleine. Jésus est là, au milieu, dès que deux cœurs se rassemblent en son nom.",invitation:"Réunissez-vous avec un autre chrétien pour prier ensemble, même brièvement."},
{ref:"Mt 22,37",texte:"Tu aimeras le Seigneur ton Dieu de tout ton cœur, de toute ton âme et de tout ton esprit.",theme:"Amour de Dieu",resume:"Le premier et grand commandement.",coeur:"Aimer Dieu de tout son être est un idéal et un chemin. Nous y tendons, nous y trébuchons, nous y revenons. Ce qui compte c'est la direction du cœur.",invitation:"Faites un acte d'amour explicite envers Dieu aujourd'hui. Dites-lui que vous l'aimez."},
{ref:"Mt 25,40",texte:"En vérité je vous le dis : dans la mesure où vous l'avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait.",theme:"Amour du prochain",resume:"Le Christ s'identifie aux plus pauvres.",coeur:"Servir les pauvres, c'est servir Jésus lui-même. Ce verset retourne notre regard sur chaque visage humain.",invitation:"Faites aujourd'hui un geste concret pour quelqu'un dans le besoin."},
{ref:"Mt 28,20",texte:"Et moi, je suis avec vous tous les jours jusqu'à la fin du monde.",theme:"Présence",resume:"La promesse finale de Jésus : une présence permanente jusqu'à la fin.",coeur:"Tous les jours. Pas seulement les jours de fête ou de grâce. Tous les jours, même les plus ternes, les plus lourds.",invitation:"Commencez chaque matin cette semaine en rappelant cette promesse : Jésus est avec moi aujourd'hui."},
// ══ MARC ══
{ref:"Mc 1,15",texte:"Le temps est accompli, le Royaume de Dieu est tout proche : convertissez-vous et croyez à l'Évangile.",theme:"Conversion",resume:"La première parole publique de Jésus : une invitation urgente à la conversion et à la foi.",coeur:"Le Royaume n'est pas une réalité lointaine — il est tout proche, il est là. La conversion est un retournement du regard, une décision de croire que l'amour de Dieu est vrai.",invitation:"Qu'est-ce qui vous empêche de croire pleinement aujourd'hui ? Parlez-en à Dieu honnêtement."},
{ref:"Mc 1,17",texte:"Venez à ma suite, et je ferai de vous des pêcheurs d'hommes.",theme:"Vocation",resume:"Jésus appelle des hommes ordinaires et leur confie une mission extraordinaire.",coeur:"Il ne cherche pas des parfaits. Il appelle des pêcheurs, des gens du commun. Ce qui compte, c'est de répondre à l'invitation de le suivre.",invitation:"Qu'est-ce que Jésus vous appelle à faire aujourd'hui ? Avez-vous répondu à son appel ?"},
{ref:"Mc 1,35",texte:"Le lendemain matin, bien avant l'aurore, il se leva et sortit pour aller dans un endroit désert, et là il priait.",theme:"Prière",resume:"Jésus lui-même se lève avant l'aube pour prier dans le silence.",coeur:"Si Jésus avait besoin de ce temps seul avec le Père, à plus forte raison nous. Le désert intérieur est nécessaire.",invitation:"Levez-vous un matin cette semaine avant votre rythme habituel, pour un temps de silence et de prière."},
{ref:"Mc 4,39",texte:"Il se leva, menaça le vent, et dit à la mer : Silence, tais-toi ! Le vent tomba, et il se fit un grand calme.",theme:"Confiance",resume:"Jésus maître du chaos montre sa puissance sur les éléments.",coeur:"Quelles tempêtes agitent votre vie intérieure ? Jésus peut dire aussi à votre âme : Silence, tais-toi. Il suffit de l'inviter à monter dans votre barque.",invitation:"Identifiez la plus grande agitation intérieure de votre vie. Demandez à Jésus d'y faire le calme."},
{ref:"Mc 4,40",texte:"Pourquoi avez-vous peur ? N'avez-vous pas encore la foi ?",theme:"Foi",resume:"Une question que Jésus pose à ses disciples après la tempête apaisée.",coeur:"La peur et la foi ne coexistent pas facilement. Mais Jésus ne condamne pas la peur — il l'invite à se transformer en confiance.",invitation:"Nommez votre peur principale. Demandez la grâce de la transformer en confiance."},
{ref:"Mc 6,34",texte:"En débarquant, il vit une grande foule ; il fut saisi de pitié pour eux, parce qu'ils étaient comme des brebis sans berger.",theme:"Compassion",resume:"La compassion de Jésus face à une foule désemparée.",coeur:"Jésus voit les foules — il ne les esquive pas. Il se laisse toucher par leur errance. Nous sommes souvent cette foule : cherchant un sens, un guide, une direction.",invitation:"Priez aujourd'hui pour ceux qui sont perdus, seuls, sans repères spirituels."},
{ref:"Mc 8,34",texte:"Si quelqu'un veut marcher à ma suite, qu'il renonce à lui-même, qu'il prenne sa croix et qu'il me suive.",theme:"Discipulat",resume:"Le chemin de la suite du Christ passe par le renoncement à soi.",coeur:"Prendre sa croix n'est pas chercher la souffrance, c'est accepter ce qui vient et l'offrir. C'est dire oui à Dieu même quand c'est difficile.",invitation:"Y a-t-il une croix que vous portez en ce moment ? Essayez de la porter avec Jésus plutôt que seul(e)."},
{ref:"Mc 9,24",texte:"Je crois ! Viens au secours de mon manque de foi !",theme:"Foi",resume:"La prière la plus honnête de l'Évangile : admettre que la foi et le doute coexistent en nous.",coeur:"Cette prière est extraordinaire par son honnêteté. Elle ne prétend pas à une foi parfaite. Elle tend la main dans l'ambiguïté. Et Jésus répond.",invitation:"Priez cette prière avec vos propres mots : Je crois, mais aide mon incroyance."},
{ref:"Mc 10,14",texte:"Laissez les enfants venir à moi, ne les empêchez pas, car c'est à leurs pareils qu'appartient le Royaume de Dieu.",theme:"Enfance spirituelle",resume:"Les enfants sont le modèle du Royaume : accueil, confiance, simplicité.",coeur:"L'enfant reçoit sans mériter. Il fait confiance sans calculer. Il s'abandonne sans peur. Voilà le cœur de la vie spirituelle.",invitation:"Approchez-vous de Dieu aujourd'hui avec la simplicité d'un enfant."},
{ref:"Mc 10,27",texte:"Pour les hommes, c'est impossible, mais pas pour Dieu ; car tout est possible à Dieu.",theme:"Espérance",resume:"Ce qui dépasse nos forces n'est pas hors de portée de Dieu.",coeur:"Nous buttons contre des impossibles. Des situations bloquées, des cœurs fermés, des habitudes tenaces. Mais Dieu n'est pas limité par nos impossibles.",invitation:"Offrez à Dieu une situation que vous jugez sans issue. Demandez-lui d'agir là où vous ne pouvez pas."},
{ref:"Mc 10,45",texte:"Car le Fils de l'homme n'est pas venu pour être servi, mais pour servir, et donner sa vie en rançon pour la multitude.",theme:"Service",resume:"L'identité de Jésus comme serviteur.",coeur:"Le Seigneur de l'univers vient servir. Cette logique renverse toutes nos hiérarchies humaines.",invitation:"Comment pouvez-vous servir aujourd'hui quelqu'un sans attendre de retour ?"},
{ref:"Mc 12,30",texte:"Tu aimeras le Seigneur ton Dieu de tout ton cœur, de toute ton âme, de tout ton esprit et de toute ta force.",theme:"Amour de Dieu",resume:"Le premier commandement : un amour total, sans réserve.",coeur:"Aimer Dieu de tout son être est un idéal et un chemin. Nous y tendons, nous y trébuchons, nous y revenons. Ce qui compte c'est la direction du cœur.",invitation:"Faites un acte d'amour explicite envers Dieu aujourd'hui."},
{ref:"Mc 16,6",texte:"Il est ressuscité, il n'est pas ici.",theme:"Résurrection",resume:"L'annonce de la résurrection par l'ange aux femmes au tombeau.",coeur:"Il n'est pas ici. Le tombeau est vide. La mort n'a pas le dernier mot. Cette nouvelle change tout.",invitation:"Laissez la joie de la Résurrection entrer dans votre cœur aujourd'hui."},
// ══ LUC ══
{ref:"Lc 1,38",texte:"Je suis la servante du Seigneur ; que tout se passe pour moi selon ta parole.",theme:"Consentement",resume:"Le fiat de Marie : le consentement le plus décisif de l'histoire.",coeur:"Marie ne comprend pas tout. Mais elle dit oui. Son oui est un acte de confiance totale dans la bonté de Dieu. C'est le modèle de toute vie spirituelle.",invitation:"Y a-t-il un oui que Dieu attend de vous ? Pouvez-vous le prononcer aujourd'hui ?"},
{ref:"Lc 2,10",texte:"Ne craignez pas, car voici que je vous annonce une grande joie, qui sera celle de tout le peuple.",theme:"Joie",resume:"L'annonce de la naissance de Jésus : une grande joie pour tous.",coeur:"La joie de Noël n'est pas réservée à une époque de l'année. Elle est permanente : Dieu est venu.",invitation:"Laissez la joie de l'Incarnation vous habiter aujourd'hui."},
{ref:"Lc 2,19",texte:"Marie, cependant, retenait tous ces événements et les méditait dans son cœur.",theme:"Contemplation",resume:"Marie modèle de la Lectio Divina : elle garde et médite la Parole.",coeur:"Garder les choses dans son cœur, les laisser travailler, les laisser mûrir — c'est exactement ce que vous faites dans cette prière. Marie vous précède sur ce chemin.",invitation:"Choisissez un mot ou une phrase de la Parole d'aujourd'hui. Portez-le toute la journée."},
{ref:"Lc 4,18",texte:"L'Esprit du Seigneur est sur moi, parce qu'il m'a consacré par l'onction pour porter la Bonne Nouvelle aux pauvres.",theme:"Mission",resume:"Jésus révèle sa mission en citant Isaïe : une mission d'annonce et de libération.",coeur:"Cette mission est aussi la nôtre par le baptême. Nous sommes oints pour apporter la Bonne Nouvelle là où nous sommes.",invitation:"Comment pouvez-vous être porteur/porteuse de Bonne Nouvelle aujourd'hui, concrètement ?"},
{ref:"Lc 6,36",texte:"Soyez miséricordieux comme votre Père est miséricordieux.",theme:"Miséricorde",resume:"L'appel à imiter la miséricorde divine dans nos relations.",coeur:"La miséricorde de Dieu n'a pas de fond. Elle ne calcule pas, elle ne se lasse pas. Nous sommes appelés à en être le reflet.",invitation:"Envers qui avez-vous du mal à être miséricordieux ? Demandez la grâce."},
{ref:"Lc 6,38",texte:"Donnez, et on vous donnera : c'est une bonne mesure, tassée, secouée, débordante, qu'on versera dans le pan de votre vêtement.",theme:"Générosité",resume:"La générosité appelle une réponse de Dieu surabondante.",coeur:"Dieu ne rend pas la monnaie. Il donne en excès. Sa logique n'est pas celle du commerce mais celle de l'amour.",invitation:"Faites aujourd'hui un geste de générosité qui vous coûte un peu."},
{ref:"Lc 10,27",texte:"Tu aimeras le Seigneur ton Dieu... et ton prochain comme toi-même.",theme:"Amour",resume:"Le double commandement de l'amour : vertical et horizontal, inséparables.",coeur:"L'amour de Dieu et l'amour du prochain ne sont pas deux commandements mais un seul. On ne peut pas vraiment aimer Dieu sans aimer ceux qu'il aime.",invitation:"Qui est votre prochain aujourd'hui ? Faites un geste d'amour concret envers lui ou elle."},
{ref:"Lc 10,41",texte:"Marthe, Marthe, tu t'inquiètes et t'agites pour beaucoup de choses. Une seule est nécessaire.",theme:"Contemplation",resume:"Jésus rappelle à Marthe que la présence à Lui précède l'action.",coeur:"Nous sommes souvent Marthe : agités, surchargés, méritants. Jésus ne condamne pas l'action — il rappelle simplement que la relation prime.",invitation:"Accordez aujourd'hui à Jésus du temps de présence simple, avant ou après vos tâches."},
{ref:"Lc 11,13",texte:"Combien plus le Père céleste donnera-t-il l'Esprit Saint à ceux qui le lui demandent !",theme:"Esprit Saint",resume:"La promesse du don de l'Esprit à celui qui le demande.",coeur:"L'Esprit est le plus grand des dons. Et Dieu le donne généreusement à ceux qui le demandent avec confiance.",invitation:"Demandez l'Esprit Saint maintenant, avec simplicité et confiance."},
{ref:"Lc 12,32",texte:"Sois sans crainte, petit troupeau : votre Père a trouvé bon de vous donner le Royaume.",theme:"Confiance",resume:"Dieu donne le Royaume par pur amour.",coeur:"Petit troupeau — l'image est tendre. Vous n'avez pas à vous battre pour mériter le Royaume. Il est donné.",invitation:"Recevez cette grâce : le Royaume vous est donné. Cessez de vous battre pour le mériter."},
{ref:"Lc 15,7",texte:"Je vous dis qu'il y aura plus de joie dans le ciel pour un seul pécheur qui se convertit.",theme:"Miséricorde",resume:"La joie de Dieu quand un pécheur revient à lui dépasse toute autre joie.",coeur:"Dieu ne nous attend pas avec des reproches. Il nous attend avec une joie qui déborde. Chaque retour vers Lui est une fête.",invitation:"Revenez à Dieu aujourd'hui si vous en étiez éloigné(e). Sa joie vous attend."},
{ref:"Lc 15,20",texte:"Comme il était encore loin, son père l'aperçut et fut saisi de compassion ; il courut se jeter à son cou et l'embrassa tendrement.",theme:"Miséricorde",resume:"L'image la plus belle de la miséricorde divine : le Père qui court vers son fils.",coeur:"Dieu ne reste pas immobile à nous attendre. Il court. Il se précipite. Sa miséricorde est plus rapide que nos péchés.",invitation:"Recevez aujourd'hui cet amour du Père. Laissez-le vous prendre dans ses bras."},
{ref:"Lc 17,21",texte:"Le Royaume de Dieu est au-dedans de vous.",theme:"Intériorité",resume:"Le Royaume n'est pas une réalité extérieure à attendre — il est déjà en nous.",coeur:"Ce verset est une invitation à l'intériorité. Chercher Dieu en soi, dans le silence de son cœur. Le Royaume commence là.",invitation:"Faites silence cinq minutes aujourd'hui. Cherchez le Royaume en vous."},
{ref:"Lc 19,10",texte:"Car le Fils de l'homme est venu chercher et sauver ce qui était perdu.",theme:"Salut",resume:"La mission de Jésus résumée en une phrase.",coeur:"Il est venu chercher. Pas attendre. Chercher. Vous êtes cherché(e), pas seulement attendu(e).",invitation:"Méditez : Jésus vous a cherché(e). Où l'avez-vous rencontré ?"},
{ref:"Lc 23,34",texte:"Père, pardonne-leur : ils ne savent pas ce qu'ils font.",theme:"Pardon",resume:"La prière de Jésus sur la croix pour ses bourreaux : le pardon ultime.",coeur:"Sur la croix, dans l'extrême souffrance, Jésus prie pour ceux qui le tuent. C'est l'amour porté à son sommet absolu.",invitation:"Y a-t-il quelqu'un qui vous a fait du mal sans s'en rendre compte ? Priez pour lui/elle aujourd'hui."},
{ref:"Lc 23,43",texte:"En vérité, je te le dis : aujourd'hui tu seras avec moi dans le Paradis.",theme:"Miséricorde",resume:"La promesse de Jésus au bon larron : le salut à la dernière heure.",coeur:"Aujourd'hui. Pas après un purgatoire de mérites. Aujourd'hui. La miséricorde de Jésus est immédiate pour ceux qui se tournent vers lui.",invitation:"Quel que soit votre passé, croyez que la miséricorde de Dieu est plus grande."},
{ref:"Lc 24,29",texte:"Reste avec nous, car le soir tombe et le jour déjà touche à sa fin.",theme:"Présence",resume:"Les disciples d'Emmaüs invitent l'Inconnu à rester. Ils reconnaîtront Jésus à la fraction du pain.",coeur:"Nous reconnaissons souvent Jésus après coup, quand nous revenons sur notre journée et que nous voyons où il était.",invitation:"Invitez Jésus à demeurer avec vous ce soir. Racontez-lui votre journée."},
// ══ JEAN ══
{ref:"Jn 1,14",texte:"Et le Verbe s'est fait chair, il a habité parmi nous, et nous avons vu sa gloire.",theme:"Incarnation",resume:"Le cœur du mystère chrétien : Dieu se fait homme.",coeur:"Dieu n'est pas resté à distance. Il a habité parmi nous, dans notre chair, notre fatigue, notre joie. La gloire de Dieu s'est révélée dans un visage humain.",invitation:"Contemplez aujourd'hui le visage de quelqu'un que vous aimez. La gloire de Dieu peut y briller."},
{ref:"Jn 3,16",texte:"Car Dieu a tellement aimé le monde qu'il a donné son Fils unique.",theme:"Amour de Dieu",resume:"Le verset le plus célèbre de la Bible : la synthèse de l'amour divin.",coeur:"Dieu n'a pas aimé le monde théoriquement. Il a donné. Il a tout mis. Son amour est concret, total, irréversible.",invitation:"Laissez ce verset vous atteindre personnellement. Remplacez 'le monde' par votre prénom."},
{ref:"Jn 4,14",texte:"Mais celui qui boira de l'eau que je lui donnerai n'aura plus jamais soif.",theme:"Vie intérieure",resume:"Jésus promet une eau vive qui étanche la soif profonde de l'âme.",coeur:"Quelle est votre soif profonde ? Au-delà des satisfactions superficielles, il y a en vous une soif que seul Dieu peut étancher.",invitation:"Nommez votre soif profonde. Apportez-la à Jésus, la source d'eau vive."},
{ref:"Jn 6,35",texte:"Je suis le pain de vie. Celui qui vient à moi n'aura plus jamais faim.",theme:"Eucharistie",resume:"Jésus se révèle comme nourriture essentielle de l'âme.",coeur:"La faim spirituelle est réelle. Nous cherchons à la remplir de mille manières. Mais seul Jésus, pain de vie, peut vraiment nous nourrir.",invitation:"Si vous pouvez, participez à l'Eucharistie cette semaine avec un regard renouvelé."},
{ref:"Jn 8,12",texte:"Je suis la lumière du monde. Celui qui me suit ne marchera pas dans les ténèbres.",theme:"Lumière",resume:"Jésus se révèle comme lumière guidant dans l'obscurité.",coeur:"Nous traversons des zones d'ombre dans nos vies. Jésus ne promet pas de les supprimer, mais de les traverser avec nous, en les éclairant.",invitation:"Dans quelle zone d'ombre avez-vous besoin de la lumière de Jésus en ce moment ?"},
{ref:"Jn 8,32",texte:"Vous connaîtrez la vérité, et la vérité vous libérera.",theme:"Liberté",resume:"La vérité révélée par Jésus comme chemin de liberté intérieure.",coeur:"La vérité que Jésus offre n'est pas d'abord une doctrine — c'est une Personne. Et cette Personne libère.",invitation:"Y a-t-il un mensonge sur vous-même dont vous avez besoin d'être libéré(e) ?"},
{ref:"Jn 10,10",texte:"Je suis venu pour que les brebis aient la vie, et qu'elles l'aient en abondance.",theme:"Vie",resume:"La vie que Jésus apporte n'est pas une survie mais une plénitude.",coeur:"La vie en abondance n'est pas luxe ou confort. C'est une vie habitée, signifiante, reliée à Dieu et aux autres. C'est la vie que Dieu rêve pour vous.",invitation:"En quoi votre vie est-elle abondante ? Rendez grâce pour cette plénitude."},
{ref:"Jn 10,11",texte:"Je suis le bon pasteur, le bon pasteur donne sa vie pour ses brebis.",theme:"Amour",resume:"Jésus révèle l'amour total du pasteur qui va jusqu'au don de soi.",coeur:"Le bon pasteur connaît chaque brebis par son nom. Vous n'êtes pas un numéro dans la foule. Vous êtes connu(e), aimé(e), cherché(e).",invitation:"Méditez que Jésus vous connaît par votre nom. Laissez cela vous toucher."},
{ref:"Jn 11,25",texte:"Je suis la résurrection et la vie. Celui qui croit en moi, même s'il meurt, vivra.",theme:"Résurrection",resume:"Jésus révèle sa victoire sur la mort.",coeur:"Face à la mort d'un être cher ou à nos propres peurs de la fin, Jésus répond : Je suis la vie. Pas une consolation — une réalité.",invitation:"Si vous portez un deuil ou une peur de la mort, confiez-le à Celui qui est la Résurrection."},
{ref:"Jn 11,35",texte:"Jésus pleura.",theme:"Compassion",resume:"Le verset le plus court de la Bible : Jésus pleure devant le tombeau de Lazare.",coeur:"Dieu pleure avec nous. Il n'est pas indifférent à nos deuils. Ce verset dit tout de la compassion divine.",invitation:"Si vous portez un deuil, laissez Jésus pleurer avec vous."},
{ref:"Jn 13,34",texte:"Je vous donne un commandement nouveau : aimez-vous les uns les autres ; comme je vous ai aimés, aimez-vous les uns les autres.",theme:"Amour",resume:"Le commandement central de Jésus : un amour modelé sur le sien.",coeur:"'Comme je vous ai aimés' — c'est la mesure. Pas un amour raisonnable et proportionné. Un amour qui va jusqu'au bout.",invitation:"Qui dans votre entourage a le plus besoin d'être aimé(e) aujourd'hui ? Allez vers cette personne."},
{ref:"Jn 14,1",texte:"Que votre cœur ne soit pas troublé. Croyez en Dieu, croyez aussi en moi.",theme:"Paix",resume:"Jésus apaise les cœurs troublés de ses disciples avant sa Passion.",coeur:"Jésus connaît nos troubles. Il ne les minimise pas. Mais il pose sa main sur eux et dit : Ne craignez pas. Je suis là.",invitation:"Posez votre trouble du moment devant Jésus. Laissez-le vous dire ces mots."},
{ref:"Jn 14,6",texte:"Je suis le chemin, la vérité et la vie.",theme:"Mystère",resume:"Jésus révèle qu'il est lui-même la réponse à toute recherche spirituelle.",coeur:"Pas une route, pas un enseignement, pas une règle — une Personne. Le chemin a un visage. La vérité a un cœur. La vie a un nom.",invitation:"Méditez chacun des trois termes : Chemin, Vérité, Vie. Lequel vous touche le plus aujourd'hui ?"},
{ref:"Jn 14,16",texte:"Et moi, je prierai le Père, et il vous donnera un autre Défenseur pour être avec vous à jamais.",theme:"Esprit Saint",resume:"La promesse du Paraclet : l'Esprit Saint comme présence permanente.",coeur:"Vous n'êtes pas orphelins. L'Esprit est avec vous à jamais. Défenseur, Consolateur, Guide.",invitation:"Parlez à l'Esprit Saint aujourd'hui. Demandez-lui de vous guider."},
{ref:"Jn 14,27",texte:"Je vous laisse la paix, je vous donne ma paix. Je ne vous la donne pas comme le monde la donne.",theme:"Paix",resume:"La paix de Jésus est d'une autre nature que la paix du monde.",coeur:"La paix du monde repose sur l'absence de problèmes. La paix du Christ existe au cœur des tempêtes. Elle est une présence, pas une absence.",invitation:"Demandez la paix du Christ pour votre journée. Pas l'absence de difficultés, mais Sa présence dans les difficultés."},
{ref:"Jn 15,4",texte:"Demeurez en moi, comme moi je demeure en vous.",theme:"Union à Dieu",resume:"Invitation à une union mystique et permanente avec le Christ.",coeur:"Demeurer en Jésus n'est pas une performance spirituelle. C'est un état de relation, d'habitation mutuelle. Je suis en Lui, Il est en moi.",invitation:"Tout au long de la journée, revenez à cette conscience : Jésus demeure en moi."},
{ref:"Jn 15,5",texte:"Je suis la vigne, et vous les sarments. Celui qui demeure en moi et en qui je demeure, celui-là donne beaucoup de fruit.",theme:"Fécondité",resume:"L'image de la vigne : notre fécondité vient de notre union au Christ.",coeur:"Le fruit ne vient pas de nos efforts séparés mais de notre union à la vigne. Plus nous demeurons en Jésus, plus nous portons du fruit naturellement.",invitation:"Vérifiez si votre action vient de l'union à Dieu ou de votre seul effort."},
{ref:"Jn 15,9",texte:"Comme le Père m'a aimé, moi aussi je vous ai aimés. Demeurez dans mon amour.",theme:"Amour de Dieu",resume:"L'amour du Christ pour nous est à la mesure de l'amour du Père pour le Fils.",coeur:"Cet amour est immense, éternel, inconditionnel. Demeurer en lui c'est ne pas s'en éloigner, ne pas se laisser convaincre qu'on n'en est pas digne.",invitation:"Répétez lentement : Jésus m'aime comme le Père l'aime. Laissez cela entrer."},
{ref:"Jn 15,13",texte:"Il n'y a pas de plus grand amour que de donner sa vie pour ses amis.",theme:"Amour",resume:"La définition ultime de l'amour selon Jésus.",coeur:"Jésus ne parle pas en théoricien. Il est en train de vivre ce qu'il dit. Sa croix est la preuve que cet amour est réel.",invitation:"Pensez à quelqu'un qui a donné beaucoup pour vous. Remerciez-le ou remerciez-la."},
{ref:"Jn 16,22",texte:"Vous voilà dans la tristesse, mais je vous reverrai et votre cœur se réjouira, et votre joie, personne ne vous l'enlèvera.",theme:"Espérance",resume:"La promesse d'une joie définitive et indestructible.",coeur:"Personne ne vous enlèvera cette joie. Elle est fondée sur la présence du Ressuscité. Rien ne peut la détruire.",invitation:"Si vous êtes dans la tristesse, accrochez-vous à cette promesse : je vous reverrai."},
{ref:"Jn 16,33",texte:"Dans le monde, vous aurez à souffrir. Mais courage ! Moi, j'ai vaincu le monde.",theme:"Espérance",resume:"La victoire du Christ est notre fondement dans l'épreuve.",coeur:"Jésus ne promet pas l'absence de souffrance. Il promet sa présence victorieuse au cœur de la souffrance.",invitation:"Méditez : Jésus a vaincu. Votre épreuve actuelle n'a pas le dernier mot."},
{ref:"Jn 17,3",texte:"Or, la vie éternelle, c'est qu'ils te connaissent, toi le seul vrai Dieu, et celui que tu as envoyé, Jésus-Christ.",theme:"Vie éternelle",resume:"La vie éternelle n'est pas une durée infinie mais une relation de connaissance intime.",coeur:"Connaître Dieu — pas seulement savoir des choses sur Lui, mais Le rencontrer, être connu de Lui. Cette relation est déjà la vie éternelle.",invitation:"Approfondissez aujourd'hui votre connaissance intime de Dieu plutôt que vos connaissances sur Dieu."},
{ref:"Jn 20,19",texte:"Jésus vint, il était là au milieu d'eux et il leur dit : La paix soit avec vous.",theme:"Paix",resume:"La première parole du Ressuscité à ses disciples : la paix.",coeur:"Les disciples sont enfermés, effrayés, brisés. Et Jésus entre sans forcer les portes et dit : Paix. Il passe à travers nos murs.",invitation:"Jésus peut traverser les murs de votre cœur fermé aujourd'hui. Laissez-le entrer."},
{ref:"Jn 20,27",texte:"Avance ton doigt ici, et vois mes mains ; avance ta main, et mets-la dans mon côté. Cesse d'être incrédule, sois croyant.",theme:"Foi",resume:"Jésus accueille le doute de Thomas avec tendresse et lui offre la preuve dont il a besoin.",coeur:"Jésus ne condamne pas Thomas pour son doute. Il vient à lui. Il lui offre ses blessures comme preuve d'amour.",invitation:"Apportez vos doutes à Dieu aujourd'hui. Il peut les transformer en foi."},
{ref:"Jn 21,15",texte:"Simon, fils de Jean, m'aimes-tu ?",theme:"Amour",resume:"Jésus ressuscité interroge Pierre trois fois sur son amour.",coeur:"Après le reniement, Jésus ne reproche rien. Il demande : M'aimes-tu ? C'est la seule question qui compte. Tout repart de là.",invitation:"Répondez à cette question aujourd'hui : M'aimes-tu ? Que dites-vous à Jésus ?"},
// ══ ACTES ══
{ref:"Ac 1,8",texte:"Vous allez recevoir une force, celle du Saint-Esprit qui descendra sur vous. Vous serez alors mes témoins.",theme:"Mission",resume:"La mission universelle des disciples animée par l'Esprit.",coeur:"Nous ne sommes pas seuls pour témoigner. L'Esprit nous précède, nous accompagne, nous inspire. Notre rôle est d'être disponibles.",invitation:"Demandez aujourd'hui au Saint-Esprit de vous guider dans votre témoignage quotidien."},
{ref:"Ac 2,4",texte:"Ils furent tous remplis d'Esprit Saint, et commencèrent à parler en d'autres langues.",theme:"Esprit Saint",resume:"La Pentecôte : l'Esprit se répand et transforme les disciples.",coeur:"L'Esprit de Dieu peut transformer des hommes peurreux en témoins courageux. Il peut aussi vous transformer.",invitation:"Demandez une effusion de l'Esprit Saint pour votre vie aujourd'hui."},
{ref:"Ac 4,20",texte:"Nous ne pouvons pas, quant à nous, ne pas parler de ce que nous avons vu et entendu.",theme:"Témoignage",resume:"Pierre et Jean ne peuvent taire ce qu'ils ont vécu avec Jésus.",coeur:"Le témoignage nait d'une expérience. Vous ne pouvez partager que ce que vous avez vraiment rencontré.",invitation:"Racontez à quelqu'un ce que Dieu a fait dans votre vie, même brièvement."},
// ══ ROMAINS ══
{ref:"Rm 5,5",texte:"L'espérance ne déçoit pas, parce que l'amour de Dieu a été répandu dans nos cœurs par le Saint-Esprit qui nous a été donné.",theme:"Espérance",resume:"L'Esprit est le garant de l'espérance chrétienne.",coeur:"L'espérance chrétienne n'est pas un optimisme naïf. Elle repose sur l'amour de Dieu déversé en nous. Cet amour ne peut pas décevoir car il vient de Dieu lui-même.",invitation:"Renouvelez votre espérance aujourd'hui. Appuyez-vous sur l'amour de Dieu, pas sur les circonstances."},
{ref:"Rm 8,1",texte:"Il n'y a donc plus maintenant de condamnation pour ceux qui sont en Jésus-Christ.",theme:"Liberté",resume:"La liberté radicale du chrétien : libéré de toute condamnation.",coeur:"Plus de condamnation. Pas moins de condamnation. Plus. Pour ceux qui sont en Jésus-Christ. Cette liberté est un don, pas une conquête.",invitation:"Recevez cette liberté aujourd'hui. Si une voix vous condamne, répondez-lui avec ce verset."},
{ref:"Rm 8,15",texte:"Vous n'avez pas reçu un esprit qui vous rende esclaves et vous ramène à la peur ; vous avez reçu un Esprit qui fait de vous des fils.",theme:"Filiation",resume:"L'Esprit nous constitue fils et filles de Dieu, libres de la peur.",coeur:"La peur est la marque de l'esclavage. La liberté est la marque de la filiation. L'Esprit nous dit que nous sommes enfants de Dieu.",invitation:"Identifiez une peur qui gouverne votre vie. Rappelez-vous : vous êtes enfant de Dieu, pas esclave."},
{ref:"Rm 8,26",texte:"De même, l'Esprit vient au secours de notre faiblesse ; nous ne savons pas prier comme il faut, mais l'Esprit lui-même intercède pour nous.",theme:"Prière",resume:"L'Esprit prie en nous quand nous ne savons plus comment prier.",coeur:"Même quand la prière est impossible, l'Esprit prend le relais. Nos gémissements, nos silences, nos larmes — l'Esprit les porte devant Dieu.",invitation:"Si vous ne savez pas comment prier aujourd'hui, confiez simplement votre incapacité à l'Esprit."},
{ref:"Rm 8,28",texte:"Nous le savons, en effet : pour ceux qui l'aiment, Dieu fait concourir toutes choses au bien.",theme:"Providence",resume:"La Providence divine travaille même dans l'adversité.",coeur:"'Toutes choses' — même les épreuves, les échecs, les trahisons. Dieu n'est pas l'auteur du mal, mais il peut en tirer du bien pour ceux qui l'aiment.",invitation:"Regardez une situation difficile de votre vie. Demandez à Dieu de vous montrer comment il en tire du bien."},
{ref:"Rm 8,31",texte:"Si Dieu est pour nous, qui sera contre nous ?",theme:"Confiance",resume:"La certitude absolue de l'amour protecteur de Dieu.",coeur:"Cette question rhétorique est une déclaration de confiance. Rien ni personne ne peut l'emporter contre celui que Dieu soutient.",invitation:"Récitez ce verset face à vos oppositions et obstacles du moment."},
{ref:"Rm 8,38",texte:"J'en ai la certitude : ni mort ni vie... ne pourra nous séparer de l'amour de Dieu qui est en Jésus-Christ notre Seigneur.",theme:"Amour de Dieu",resume:"L'inséparabilité de l'amour de Dieu.",coeur:"Cette certitude de Paul est une ancre pour les jours de doute. Quand tout vacille, cela demeure : l'amour de Dieu en Jésus-Christ.",invitation:"Mémorisez ce verset. Portez-le comme un bouclier dans les moments de désespoir."},
{ref:"Rm 12,2",texte:"Ne prenez pas pour modèle le monde présent, mais transformez-vous en renouvelant votre façon de penser.",theme:"Conversion",resume:"La conversion chrétienne est une transformation intérieure du regard.",coeur:"La transformation vient de l'intérieur. Ce n'est pas d'abord changer ses comportements, c'est changer sa manière de voir.",invitation:"Y a-t-il une manière de penser qui doit changer en vous ? Demandez l'Esprit de renouvellement."},
{ref:"Rm 12,12",texte:"Réjouissez-vous dans l'espérance, soyez patients dans la détresse, persévérez dans la prière.",theme:"Vie chrétienne",resume:"Trois attitudes fondamentales du chrétien face à l'épreuve.",coeur:"Trois verbes, trois postures. La joie, la patience, la prière — un programme de vie spirituelle compact et puissant.",invitation:"Laquelle de ces trois attitudes vous manque le plus en ce moment ? Travaillez-la aujourd'hui."},
// ══ 1 CORINTHIENS ══
{ref:"1Co 13,4",texte:"La charité est longanime, la charité est serviable ; la charité n'est pas envieuse.",theme:"Amour",resume:"Paul décrit l'amour véritable à travers ses qualités concrètes.",coeur:"Ce texte est un miroir. Remplacez le mot 'charité' par votre prénom. Là où ça coince, c'est là où vous êtes invité(e) à grandir.",invitation:"Lisez 1Co 13 lentement en remplaçant 'charité' par votre prénom. Recevez humblement ce que vous entendez."},
{ref:"1Co 13,13",texte:"Maintenant donc ces trois-là demeurent : la foi, l'espérance et la charité ; mais la plus grande, c'est la charité.",theme:"Amour",resume:"Les trois vertus théologales avec la primauté de l'amour.",coeur:"La foi passera car nous verrons. L'espérance passera car nous posséderons. Seul l'amour demeure pour l'éternité.",invitation:"Faites un acte d'amour gratuit aujourd'hui, sans attente de retour."},
// ══ 2 CORINTHIENS ══
{ref:"2Co 4,16",texte:"Même si notre homme extérieur se détruit, notre homme intérieur se renouvelle de jour en jour.",theme:"Espérance",resume:"La dégradation extérieure n'empêche pas le renouvellement intérieur.",coeur:"Le vieillissement, la maladie, l'usure du temps — tout cela atteint le dehors. Mais au-dedans, l'Esprit renouvelle.",invitation:"Prenez soin de votre homme ou femme intérieur(e) par un temps de prière et de silence."},
{ref:"2Co 5,17",texte:"Si quelqu'un est en Christ, il est une créature nouvelle. Le monde ancien est passé, voici qu'une réalité nouvelle est là.",theme:"Conversion",resume:"En Christ, une nouvelle création commence.",coeur:"Vous n'êtes pas condamné(e) à rester ce que vous êtes. En Christ, il y a un commencement perpétuel, une nouveauté toujours possible.",invitation:"Recevez aujourd'hui votre identité de créature nouvelle. Laissez le passé au passé."},
{ref:"2Co 12,9",texte:"Ma grâce te suffit : car la puissance se déploie pleinement dans la faiblesse.",theme:"Faiblesse",resume:"La puissance de Dieu se manifeste précisément dans notre faiblesse.",coeur:"Nous voudrions être forts, parfaits, sans failles. Mais Dieu choisit précisément nos failles pour y déployer sa puissance.",invitation:"Nommez votre principale faiblesse. Offrez-la à Dieu comme le lieu où sa puissance peut se manifester."},
// ══ GALATES ══
{ref:"Ga 2,20",texte:"Je vis, mais ce n'est plus moi qui vis, c'est le Christ qui vit en moi.",theme:"Union à Dieu",resume:"L'identification au Christ : la vie chrétienne comme participation à la vie du Christ.",coeur:"Ce n'est plus moi. C'est le Christ. Ce renversement est le cœur de la vie chrétienne.",invitation:"Méditez cette phrase au réveil : Ce n'est plus moi qui vis, c'est le Christ qui vit en moi."},
{ref:"Ga 5,22",texte:"Le fruit de l'Esprit, c'est l'amour, la joie, la paix, la patience, la bonté, la bienveillance, la foi, la douceur, la maîtrise de soi.",theme:"Esprit Saint",resume:"Les fruits de l'Esprit : les marques visibles d'une vie habitée par Dieu.",coeur:"Ces fruits ne s'obtiennent pas par effort. Ils viennent de l'Esprit. Notre rôle est de rester connectés à la vigne.",invitation:"Lequel de ces fruits manque dans votre vie ? Demandez-le à l'Esprit Saint."},
// ══ ÉPHÉSIENS ══
{ref:"Ep 2,8",texte:"C'est par la grâce en effet que vous êtes sauvés, par le moyen de la foi. Ce salut ne vient pas de vous, il est un don de Dieu.",theme:"Grâce",resume:"Le salut est entièrement un don gratuit de Dieu.",coeur:"Nous ne gagnons pas notre salut. Nous le recevons. Cette vérité libère de toute performance religieuse.",invitation:"Recevez le salut comme un don aujourd'hui. Rendez grâce pour ce que vous n'avez pas mérité."},
{ref:"Ep 3,17",texte:"Que le Christ habite en vos cœurs par la foi, et que vous soyez enracinés, fondés dans l'amour.",theme:"Union à Dieu",resume:"Paul prie pour que le Christ s'établisse profondément dans les cœurs des fidèles.",coeur:"Un arbre enraciné profondément résiste aux tempêtes. Un cœur enraciné dans l'amour du Christ peut traverser n'importe quelle épreuve.",invitation:"Vérifiez la profondeur de vos racines spirituelles."},
{ref:"Ep 4,32",texte:"Soyez entre vous bienveillants, compatissants, vous pardonnant mutuellement comme Dieu vous a pardonné dans le Christ.",theme:"Pardon",resume:"Le modèle du pardon chrétien est le pardon de Dieu lui-même.",coeur:"Pardonner comme Dieu pardonne — sans conditions, sans calcul, par pur amour.",invitation:"Pardonnez aujourd'hui à quelqu'un comme Dieu vous a pardonné."},
// ══ PHILIPPIENS ══
{ref:"Ph 4,4",texte:"Réjouissez-vous sans cesse dans le Seigneur ; je le répète, réjouissez-vous.",theme:"Joie",resume:"Paul commande la joie — non comme sentiment mais comme posture spirituelle.",coeur:"La joie chrétienne n'est pas l'humeur du moment. C'est une orientation de l'âme vers Dieu, source de tout bien.",invitation:"Choisissez la joie aujourd'hui. Pas l'euphorie — la joie profonde ancrée en Dieu."},
{ref:"Ph 4,6",texte:"Ne vous inquiétez de rien ; mais en tout, par la prière et la supplication, avec action de grâces, faites connaître vos demandes à Dieu.",theme:"Prière",resume:"Paul propose la prière comme antidote à l'inquiétude.",coeur:"Au lieu de ressasser, priez. Transformez chaque inquiétude en prière. Ce n'est pas de la magie — c'est un chemin de liberté intérieure.",invitation:"Choisissez une de vos inquiétudes et transformez-la en prière concrète maintenant."},
{ref:"Ph 4,7",texte:"Et la paix de Dieu, qui surpasse toute intelligence, gardera vos cœurs et vos pensées en Jésus-Christ.",theme:"Paix",resume:"La paix divine dépasse toute compréhension humaine.",coeur:"Cette paix ne s'explique pas. Elle ne dépend pas des circonstances. Elle vient de Dieu et protège le cœur de l'intérieur.",invitation:"Demandez cette paix qui surpasse l'intelligence. Laissez-la garder votre cœur aujourd'hui."},
{ref:"Ph 4,13",texte:"Je puis tout en celui qui me fortifie.",theme:"Force",resume:"Paul exprime sa confiance absolue en la force que le Christ lui donne.",coeur:"Non pas : je peux tout par ma volonté. Mais : je peux tout en Celui qui me fortifie. C'est une dépendance joyeuse, source de liberté.",invitation:"Affrontez votre défi du jour avec cette confiance : je le peux en Celui qui me fortifie."},
// ══ COLOSSIENS ══
{ref:"Col 3,16",texte:"Que la parole du Christ demeure en vous, riche de toute sa sagesse.",theme:"Parole",resume:"L'invitation à laisser la Parole habiter abondamment notre vie intérieure.",coeur:"La Parole n'est pas faite pour rester dans les livres. Elle est faite pour habiter nos cœurs, orienter nos pensées, inspirer nos actes.",invitation:"Choisissez un verset à mémoriser cette semaine. Laissez-le vous habiter."},
// ══ 1 THESSALONICIENS ══
{ref:"1Th 5,16",texte:"Soyez toujours dans la joie.",theme:"Joie",resume:"L'exhortation la plus courte de Paul : deux mots, un programme de vie.",coeur:"Deux mots. Un programme. La joie n'est pas une émotion réservée aux jours heureux. C'est une décision spirituelle, une orientation du cœur vers Dieu.",invitation:"Faites le choix conscient de la joie aujourd'hui, quelle que soit la situation."},
{ref:"1Th 5,17",texte:"Priez sans cesse.",theme:"Prière",resume:"La prière continue comme atmosphère de toute la vie chrétienne.",coeur:"Prier sans cesse ne signifie pas être à genoux toute la journée. C'est vivre dans une présence habituée à Dieu, une conversation intérieure continue.",invitation:"Adoptez une petite formule de prière à répéter tout au long de votre journée."},
{ref:"1Th 5,18",texte:"En toutes choses, rendez grâces, car c'est la volonté de Dieu à votre égard en Jésus-Christ.",theme:"Gratitude",resume:"L'action de grâces en toutes circonstances est une volonté divine.",coeur:"Remercier dans l'épreuve n'est pas de la résignation. C'est une foi qui affirme que Dieu peut tirer du bien de tout.",invitation:"Rendez grâce pour quelque chose de difficile que vous traversez en ce moment."},
// ══ HÉBREUX ══
{ref:"He 4,12",texte:"Elle est vivante, la parole de Dieu, énergique et plus coupante qu'une épée à double tranchant.",theme:"Parole",resume:"La Parole de Dieu est vivante et puissante, elle atteint le fond de l'âme.",coeur:"La Parole n'est pas un texte inerte. Elle est vivante. Elle agit. Elle nous rejoint là où personne d'autre ne peut entrer.",invitation:"Lisez un passage de l'Écriture aujourd'hui en lui laissant le temps d'agir en vous."},
{ref:"He 11,1",texte:"La foi, c'est la garantie des biens que l'on espère, la preuve des réalités qu'on ne voit pas.",theme:"Foi",resume:"La définition classique de la foi dans l'épître aux Hébreux.",coeur:"La foi porte sur ce qu'on ne voit pas encore mais qui est plus réel que ce qu'on voit. C'est une certitude du cœur.",invitation:"Sur quoi repose votre foi aujourd'hui ? Renforcez ce fondement."},
{ref:"He 13,8",texte:"Jésus-Christ est le même hier, aujourd'hui, et pour les siècles.",theme:"Fidélité",resume:"L'immuabilité du Christ comme fondement de la foi.",coeur:"Tout change autour de nous. Mais Jésus-Christ ne change pas. Sa fidélité est absolue, son amour identique à lui-même pour toujours.",invitation:"Appuyez-vous aujourd'hui sur la fidélité immuable du Christ."},
// ══ JACQUES ══
{ref:"Jc 1,17",texte:"Tout don excellent et tout cadeau parfait vient d'en haut.",theme:"Gratitude",resume:"Chaque bien reçu vient de Dieu.",coeur:"Rien de bon en nous, autour de nous, n'est le fruit du seul hasard. Tout bien est un cadeau venu d'en haut.",invitation:"Faites la liste de trois dons excellents dans votre vie. Remerciez le donateur."},
{ref:"Jc 4,8",texte:"Approchez-vous de Dieu, et il s'approchera de vous.",theme:"Prière",resume:"La réciprocité du mouvement vers Dieu.",coeur:"Dieu attend notre initiative. Non qu'il reste passif — mais il respecte notre liberté. Chaque pas vers Lui est reçu et accompagné.",invitation:"Faites un pas concret vers Dieu aujourd'hui. Une prière, une lecture, un acte de charité."},
// ══ 1 PIERRE ══
{ref:"1P 1,8",texte:"Sans l'avoir vu, vous l'aimez ; sans le voir encore, vous croyez en lui et vous exultez d'une joie indicible et glorieuse.",theme:"Foi",resume:"La foi qui aime sans voir.",coeur:"Nous n'avons pas vu Jésus de nos yeux. Et pourtant nous l'aimons. Cette foi qui aime sans voir est une grâce extraordinaire.",invitation:"Laissez monter en vous cet amour pour Celui que vous n'avez pas vu mais qui est plus réel que tout."},
{ref:"1P 5,7",texte:"Déchargez-vous sur lui de tous vos soucis, car lui-même prend soin de vous.",theme:"Confiance",resume:"Dieu prend soin de nous — nous pouvons lui confier nos fardeaux.",coeur:"Dieu prend soin de vous. Pas une prise en charge lointaine et bureaucratique — une attention personnelle, tendre, continuelle.",invitation:"Confiez concrètement à Dieu chaque souci que vous portez en ce moment."},
// ══ 1 JEAN ══
{ref:"1Jn 1,9",texte:"Si nous reconnaissons nos péchés, lui, fidèle et juste, pardonnera nos péchés et nous purifiera de tout ce qui n'est pas juste.",theme:"Pardon",resume:"La confession sincère est accueillie par la fidélité miséricordieuse de Dieu.",coeur:"Dieu est fidèle — pas capricieux. Son pardon n'est pas conditionnel à notre perfection mais à notre honnêteté avec lui.",invitation:"Reconnaissez honnêtement devant Dieu ce qui pèse sur votre conscience. Recevez son pardon."},
{ref:"1Jn 3,1",texte:"Voyez comme le Père nous a donné un grand amour, pour que nous soyons appelés enfants de Dieu. Et nous le sommes !",theme:"Filiation",resume:"L'émerveillement de Jean devant notre dignité de fils et filles de Dieu.",coeur:"Et nous le sommes ! Pas seulement appelés — nous le sommes réellement. Cette identité est donnée, pas méritée.",invitation:"Contemplez votre identité d'enfant de Dieu. Laissez cet émerveillement vous toucher."},
{ref:"1Jn 4,8",texte:"Celui qui n'aime pas n'a pas connu Dieu, car Dieu est amour.",theme:"Amour",resume:"L'équation fondamentale : Dieu est amour.",coeur:"Dieu n'a pas l'amour comme attribut parmi d'autres. Il EST amour. Comprendre Dieu c'est comprendre l'amour.",invitation:"Méditez : Dieu est amour. Qu'est-ce que cela change à votre image de Dieu ?"},
{ref:"1Jn 4,18",texte:"Il n'y a pas de crainte dans l'amour ; l'amour parfait chasse la crainte.",theme:"Amour",resume:"L'amour parfait libère de toute peur.",coeur:"La peur et l'amour ne peuvent cohabiter pleinement. Plus nous grandissons dans l'amour de Dieu, plus nos peurs diminuent.",invitation:"Identifiez une peur qui habite votre cœur. Demandez à l'amour de Dieu de la chasser."},
{ref:"1Jn 4,19",texte:"Nous, nous aimons parce que lui nous a aimés le premier.",theme:"Amour",resume:"Notre amour est une réponse à l'initiative de Dieu.",coeur:"Nous n'aimons pas pour mériter d'être aimés. Nous aimons parce que nous avons été aimés en premier. L'amour de Dieu est la source.",invitation:"Relisez les moments où vous avez senti l'amour de Dieu. Laissez-les inspirer votre amour."},
// ══ APOCALYPSE ══
{ref:"Ap 3,20",texte:"Voici que je me tiens à la porte, et je frappe. Si quelqu'un entend ma voix et ouvre la porte, j'entrerai chez lui.",theme:"Présence",resume:"Jésus à la porte du cœur : une image d'invitation et de respect de la liberté.",coeur:"Jésus ne force pas les portes. Il frappe. Il attend. Il respecte votre liberté. L'initiative revient à vous : ouvrir ou non.",invitation:"Ouvrez la porte à Jésus aujourd'hui. Invitez-le explicitement à entrer dans votre journée."},
{ref:"Ap 21,4",texte:"Il essuiera toute larme de leurs yeux, la mort ne sera plus, et il n'y aura plus ni deuil, ni cri, ni douleur.",theme:"Espérance",resume:"La promesse eschatologique d'une vie sans larmes ni mort.",coeur:"Ce verset est une promesse pour tous ceux qui souffrent. Toute larme sera essuyée. Pas ignorée — essuyée, avec tendresse.",invitation:"Si vous portez une douleur, une perte, une larme — offrez-la à Dieu avec cette promesse."},

{ref:"Mt 11,29",texte:"I am gentle and humble in heart, and you will find rest for your souls.",theme:"Rest",resume:"The yoke of Christ is not a burden but a liberation.",coeur:"The gentleness and humility of Jesus are the form of his power.",invitation:"Imitate the gentleness of Jesus in a difficult situation today."},
