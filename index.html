{ref:"Mt 5,7",texte:"Beati i misericordiosi, perché troveranno misericordia.",theme:"Beatitudini",resume:"La misericordia che diamo ci ritorna. È una legge del Regno.",coeur:"Perdonare è una scelta libera. E ogni volta che perdoniamo, riceviamo qualcosa da Dio.",invitation:"C'è qualcuno a cui potresti perdonare oggi, anche interiormente?"},
{ref:"Mt 5,8",texte:"Beati i puri di cuore, perché vedranno Dio.",theme:"Beatitudini",resume:"La purezza del cuore permette di vedere Dio ovunque.",coeur:"Un cuore puro non è un cuore senza ferite. È un cuore senza doppiezza che cerca Dio sinceramente.",invitation:"Verifica l'intenzione dietro le tue azioni oggi."},
{ref:"Mt 5,9",texte:"Beati gli operatori di pace, perché saranno chiamati figli di Dio.",theme:"Beatitudini",resume:"La pace è un'opera attiva di riconciliazione.",coeur:"Fare la pace è imitare Dio stesso.",invitation:"Cerca una situazione tesa intorno a te. Cosa puoi fare per seminare pace?"},
{ref:"Mt 5,14",texte:"Voi siete la luce del mondo.",theme:"Missione",resume:"Gesù affida ai suoi discepoli un'identità luminosa.",coeur:"Sei luce — non per i tuoi meriti, ma perché Dio ti ha toccato.",invitation:"Lascia che qualcuno veda qualcosa di bello in te oggi."},
{ref:"Mt 5,16",texte:"Risplenda la vostra luce davanti agli uomini, perché vedano le vostre opere buone e glorifichino il Padre vostro.",theme:"Missione",resume:"Il nostro irradiare è un cammino perché gli altri incontrino Dio.",coeur:"I nostri atti di bontà sono finestre attraverso cui la luce di Dio passa nel mondo.",invitation:"Fai oggi una buona azione senza dirlo a nessuno. Lascia che Dio sia l'unica ricompensa."},
{ref:"Mt 5,44",texte:"Amate i vostri nemici e pregate per coloro che vi perseguitano.",theme:"Amore",resume:"Il comandamento più radicale di Gesù: amare fino al nemico.",coeur:"Amare il nemico non è naturale. È una grazia.",invitation:"Prega oggi per qualcuno che ti ha fatto del male. Anche una breve preghiera."},
{ref:"Mt 6,3",texte:"Quando fai l'elemosina, non sappia la tua sinistra quello che fa la tua destra.",theme:"Umiltà",resume:"Discrezione nel fare il bene: agire senza cercare riconoscimento.",coeur:"L'azione nascosta è l'azione più libera. Non si aspetta nulla in cambio.",invitation:"Fai oggi un bene che nessuno saprà mai."},
{ref:"Mt 6,6",texte:"Tu invece, quando vuoi pregare, entra nella tua camera, chiudi la porta e prega il Padre tuo nel segreto.",theme:"Preghiera",resume:"Gesù invita a una preghiera intima e segreta.",coeur:"La camera interiore è un luogo che nessuno può invadere. Lì ti aspetta Dio.",invitation:"Concediti 5 minuti da solo con Dio oggi. Solo essere lì."},
{ref:"Mt 6,9",texte:"Voi dunque pregate così: Padre nostro che sei nei cieli.",theme:"Preghiera",resume:"Gesù ci insegna a rivolgerci a Dio come Padre.",coeur:"Dire 'Padre nostro' cambia tutto. Non un Dio lontano — un Padre che ci aspetta.",invitation:"Prega il Padre Nostro oggi molto lentamente, soppesando ogni parola."},
{ref:"Mt 6,21",texte:"Perché dov'è il tuo tesoro, là sarà anche il tuo cuore.",theme:"Libertà interiore",resume:"Il profondo legame tra ciò che amiamo e ciò che diventiamo.",coeur:"Ciò che cerchi con ardore plasma il tuo cuore.",invitation:"Fai l'inventario del tuo tempo. Cosa occupa davvero il tuo cuore questa settimana?"},
{ref:"Mt 6,25",texte:"Perciò vi dico: non preoccupatevi per la vostra vita.",theme:"Fiducia",resume:"Gesù libera i suoi discepoli dal giogo dell'ansia.",coeur:"L'ansia è spesso una sfiducia mascherata.",invitation:"Nomina la tua principale preoccupazione. Affidala a Dio in una breve preghiera."},
{ref:"Mt 6,33",texte:"Cercate prima il regno di Dio e la sua giustizia, e tutte queste cose vi saranno date in aggiunta.",theme:"Fiducia",resume:"Se mettiamo Dio al primo posto, Lui provvede a tutto il resto.",coeur:"Cercare prima il Regno significa riorientare tutta la propria vita.",invitation:"Inizia domani con un tempo di preghiera prima di qualsiasi altra cosa."},
{ref:"Mt 7,7",texte:"Chiedete e vi sarà dato; cercate e troverete; bussate e vi sarà aperto.",theme:"Preghiera",resume:"Gesù incoraggia una perseveranza fiduciosa nella preghiera.",coeur:"Dio non è avaro. Aspetta la nostra richiesta per darsi più pienamente.",invitation:"C'è una preghiera che hai abbandonato? Riprendila oggi."},
{ref:"Mt 7,12",texte:"Tutto quanto volete che gli uomini facciano a voi, anche voi fatelo a loro.",theme:"Amore del prossimo",resume:"La regola d'oro riassume tutta la legge morale.",coeur:"Questa regola mette l'altro al centro.",invitation:"Prima di agire verso qualcuno oggi, chiediti: è questo che vorrei che mi facessero?"},
{ref:"Mt 9,36",texte:"Vedendo le folle ne sentì compassione, perché erano stanche e sfinite.",theme:"Compassione",resume:"Il cuore di Gesù si lascia toccare dalla sofferenza delle persone.",coeur:"Gesù non mantiene le distanze. Si lascia raggiungere.",invitation:"Guarda le persone intorno a te oggi con occhi di compassione piuttosto che di giudizio."},
{ref:"Mt 11,28",texte:"Venite a me, voi tutti che siete affaticati e oppressi, e io vi darò ristoro.",theme:"Riposo",resume:"Un invito universale al riposo per tutti coloro che sono esausti.",coeur:"Gesù ti accoglie anche nella tua stanchezza.",invitation:"Porta a Gesù ciò che ti pesa di più oggi. Deponilo ai suoi piedi."},
{ref:"Mt 11,29",texte:"Sono mite e umile di cuore, e troverete ristoro per la vostra vita.",theme:"Riposo",resume:"Il giogo di Cristo non è un peso ma una liberazione.",coeur:"La mitezza e l'umiltà di Gesù sono la forma del suo potere.",invitation:"Imita la mitezza di Gesù in una situazione difficile oggi."},
{ref:"Mt 13,44",texte:"Il regno dei cieli è simile a un tesoro nascosto nel campo.",theme:"Regno",resume:"La gioia di trovare il Regno supera ogni altro bene.",coeur:"Hai scoperto quel tesoro? Il momento in cui hai sentito che Dio era reale e prezioso?",invitation:"Ricorda un momento di grazia. Ringrazia per quel tesoro."},
{ref:"Mt 14,27",texte:"Coraggio, sono io, non abbiate paura!",theme:"Fiducia",resume:"Gesù viene incontro ai discepoli sull'acqua.",coeur:"Nella tempesta della notte, Gesù viene. La sua prima parola è: Coraggio.",invitation:"Senti Gesù dirti oggi: Coraggio, sono io, non aver paura."},
{ref:"Mt 18,3",texte:"Se non vi convertirete e non diventerete come i bambini, non entrerete nel regno dei cieli.",theme:"Infanzia spirituale",resume:"La necessaria conversione verso la semplicità infantile.",coeur:"Il bambino riceve senza meritare, si fida senza calcolare, si abbandona senza paura.",invitation:"Avvicinati a Dio oggi con la semplicità di un bambino."},
{ref:"Mt 18,20",texte:"Perché dove sono due o tre riuniti nel mio nome, lì sono io in mezzo a loro.",theme:"Comunità",resume:"La presenza di Cristo è garantita anche nelle piccole riunioni.",coeur:"Due o tre. Non serve una cattedrale piena. Gesù è lì.",invitation:"Riunisciti con un altro cristiano per pregare insieme, anche brevemente."},
{ref:"Mt 22,37",texte:"Amerai il Signore tuo Dio con tutto il tuo cuore, con tutta la tua anima e con tutta la tua mente.",theme:"Amore di Dio",resume:"Il primo e grande comandamento.",coeur:"Amare Dio con tutto il proprio essere è sia un ideale che un cammino.",invitation:"Fai un atto esplicito di amore verso Dio oggi. Digli che lo ami."},
{ref:"Mt 25,40",texte:"In verità vi dico: ogni volta che avete fatto queste cose a uno dei più piccoli di questi miei fratelli, lo avete fatto a me.",theme:"Amore del prossimo",resume:"Cristo si identifica con i più poveri.",coeur:"Servire i poveri è servire Gesù stesso.",invitation:"Fai qualcosa di concreto per qualcuno nel bisogno oggi."},
{ref:"Mt 28,20",texte:"Ecco, io sono con voi tutti i giorni, fino alla fine del mondo.",theme:"Presenza",resume:"La promessa finale di Gesù: una presenza permanente.",coeur:"Ogni giorno. Anche i più grigi, i più pesanti.",invitation:"Inizia ogni mattina questa settimana ricordando: Gesù è con me oggi."},
{ref:"Mc 1,15",texte:"Il regno di Dio è vicino; convertitevi e credete nel Vangelo.",theme:"Conversione",resume:"Le prime parole pubbliche di Gesù.",coeur:"Il Regno non è una realtà lontana — è qui. La conversione è un cambiamento dello sguardo.",invitation:"Cosa ti impedisce di credere pienamente oggi? Parlane a Dio onestamente."},
{ref:"Mc 1,17",texte:"Venite dietro a me, vi farò diventare pescatori di uomini.",theme:"Vocazione",resume:"Gesù chiama persone ordinarie e affida loro una missione straordinaria.",coeur:"Non cerca persone perfette. Ciò che conta è rispondere all'invito.",invitation:"A cosa ti chiama Gesù oggi?"},
{ref:"Mc 1,35",texte:"La mattina presto, quando era ancora buio, si alzò e uscì verso un luogo deserto e là pregava.",theme:"Preghiera",resume:"Gesù stesso si alza prima dell'alba per pregare nel silenzio.",coeur:"Se Gesù aveva bisogno di quel tempo solo con il Padre, quanto più noi.",invitation:"Alzati una mattina questa settimana per un tempo di silenzio e preghiera."},
{ref:"Mc 4,39",texte:"Silenzio! Taci! Il vento cessò e ci fu grande bonaccia.",theme:"Fiducia",resume:"Gesù, padrone del caos, mostra il suo potere.",coeur:"Gesù può dire anche alla tua anima: Silenzio, taci.",invitation:"Chiedi a Gesù di portare calma nella tua agitazione interiore."},
{ref:"Mc 4,40",texte:"Perché avete paura? Non avete ancora fede?",theme:"Fede",resume:"La domanda di Gesù dopo aver calmato la tempesta.",coeur:"Paura e fede non coesistono facilmente. Gesù invita la paura a trasformarsi in fiducia.",invitation:"Nomina la tua paura principale. Chiedi la grazia di trasformarla in fiducia."},
{ref:"Mc 6,34",texte:"Sceso dalla barca, vide una grande folla e ne sentì compassione, perché erano come pecore senza pastore.",theme:"Compassione",resume:"La compassione di Gesù di fronte a una folla disorientata.",coeur:"Gesù vede le folle — non le evita. Si lascia toccare dal loro errare.",invitation:"Prega oggi per coloro che sono persi, soli, senza punti di riferimento spirituali."},
{ref:"Mc 8,34",texte:"Se qualcuno vuole venire dietro a me, rinneghi se stesso, prenda la sua croce e mi segua.",theme:"Discepolato",resume:"Il cammino del seguire Cristo passa per il rinnegamento di sé.",coeur:"Prendere la propria croce significa accettare ciò che viene e offrirlo.",invitation:"C'è una croce che porti ora? Portala con Gesù piuttosto che da solo."},
{ref:"Mc 9,24",texte:"Credo! Aiuta la mia incredulità!",theme:"Fede",resume:"La preghiera più onesta del Vangelo.",coeur:"Questa preghiera non finge una fede perfetta. Tende la mano nell'ambiguità.",invitation:"Prega con le tue parole: Credo, ma aiuta la mia incredulità."},
{ref:"Mc 10,14",texte:"Lasciate che i bambini vengano a me; il regno di Dio appartiene a chi è come loro.",theme:"Infanzia spirituale",resume:"I bambini sono il modello del Regno.",coeur:"Il bambino riceve senza meritare. Si fida senza calcolare.",invitation:"Avvicinati a Dio oggi con la semplicità di un bambino."},
{ref:"Mc 10,27",texte:"Impossibile agli uomini, ma non a Dio! Perché tutto è possibile a Dio.",theme:"Speranza",resume:"Ciò che supera le nostre forze non è al di là della portata di Dio.",coeur:"Dio non è limitato dai nostri impossibili.",invitation:"Offri a Dio una situazione che consideri senza uscita."},
{ref:"Mc 10,45",texte:"Il Figlio dell'uomo non è venuto per essere servito, ma per servire.",theme:"Servizio",resume:"L'identità di Gesù come servo.",coeur:"Il Signore dell'universo viene a servire. Questa logica sovverte tutte le nostre gerarchie.",invitation:"Servi qualcuno oggi senza aspettarti nulla in cambio."},
{ref:"Mc 12,30",texte:"Amerai il Signore tuo Dio con tutto il tuo cuore, con tutta la tua anima, con tutta la tua mente e con tutta la tua forza.",theme:"Amore di Dio",resume:"Il primo comandamento: un amore totale, senza riserve.",coeur:"Amare Dio con tutto il proprio essere è un ideale e un cammino.",invitation:"Fai un atto esplicito di amore verso Dio oggi."},
{ref:"Mc 16,6",texte:"È risorto, non è qui.",theme:"Risurrezione",resume:"L'annuncio della risurrezione.",coeur:"La tomba è vuota. La morte non ha l'ultima parola.",invitation:"Lascia che la gioia della Risurrezione entri nel tuo cuore oggi."},
{ref:"Lc 1,38",texte:"Eccomi, sono la serva del Signore; avvenga di me quello che hai detto.",theme:"Consenso",resume:"Il fiat di Maria: il consenso più decisivo della storia.",coeur:"Maria non capisce tutto. Ma dice sì. Un atto di totale fiducia.",invitation:"C'è un sì che Dio aspetta da te?"},
{ref:"Lc 2,10",texte:"Non temete, ecco vi annuncio una grande gioia, che sarà di tutto il popolo.",theme:"Gioia",resume:"L'annuncio della nascita di Gesù: una grande gioia per tutti.",coeur:"La gioia del Natale non è riservata a un'epoca dell'anno. È permanente: Dio è venuto.",invitation:"Lascia che la gioia dell'Incarnazione ti abiti oggi."},
{ref:"Lc 2,19",texte:"Maria serbava tutte queste cose meditandole nel suo cuore.",theme:"Contemplazione",resume:"Maria, modello di Lectio Divina.",coeur:"Custodire le cose nel cuore, lasciarle maturare — Maria ti precede su questo cammino.",invitation:"Scegli una parola dalla Parola di oggi. Portala per tutta la giornata."},
{ref:"Lc 4,18",texte:"Lo Spirito del Signore è su di me per portare ai poveri il lieto annuncio.",theme:"Missione",resume:"Gesù rivela la sua missione.",coeur:"Questa missione è anche la nostra attraverso il battesimo.",invitation:"Come puoi essere portatore di Buona Notizia oggi, concretamente?"},
{ref:"Lc 6,36",texte:"Siate misericordiosi, come il Padre vostro è misericordioso.",theme:"Misericordia",resume:"L'invito a imitare la misericordia divina.",coeur:"La misericordia di Dio non calcola e non si stanca.",invitation:"Verso chi fai fatica a essere misericordioso? Chiedi la grazia."},
{ref:"Lc 6,38",texte:"Date e vi sarà dato: una misura buona, pigiata, colma e traboccante.",theme:"Generosità",resume:"La generosità chiama una risposta sovrabbondante da Dio.",coeur:"Dio non restituisce in proporzione. Dà in eccesso.",invitation:"Fai oggi un gesto di generosità che ti costi un po'."},
{ref:"Lc 10,27",texte:"Amerai il Signore tuo Dio... e il tuo prossimo come te stesso.",theme:"Amore",resume:"Il duplice comandamento dell'amore.",coeur:"L'amore di Dio e l'amore del prossimo non sono due comandamenti ma uno solo.",invitation:"Chi è il tuo prossimo oggi? Fai un gesto concreto di amore."},
{ref:"Lc 10,41",texte:"Marta, Marta, tu ti preoccupi e ti agiti per molte cose, ma di una cosa sola c'è bisogno.",theme:"Contemplazione",resume:"Gesù ricorda a Marta che la presenza a Lui precede l'azione.",coeur:"Gesù non condanna l'azione — ricorda semplicemente che la relazione viene prima.",invitation:"Dona a Gesù un tempo di presenza semplice oggi."},
{ref:"Lc 11,13",texte:"Quanto più il Padre vostro celeste darà lo Spirito Santo a coloro che glielo chiedono!",theme:"Spirito Santo",resume:"La promessa del dono dello Spirito a chi lo chiede.",coeur:"Lo Spirito è il dono più grande. E Dio lo dà generosamente.",invitation:"Chiedi lo Spirito Santo adesso, con semplicità e fiducia."},
{ref:"Lc 12,32",texte:"Non temere, piccolo gregge, perché al Padre vostro è piaciuto darvi il suo regno.",theme:"Fiducia",resume:"Dio dà il Regno per puro amore.",coeur:"Piccolo gregge — l'immagine è tenera. Il Regno è dato, non guadagnato.",invitation:"Ricevi questa grazia: il Regno ti è dato."},
{ref:"Lc 15,7",texte:"Vi sarà più gioia in cielo per un solo peccatore che si converte.",theme:"Misericordia",resume:"La gioia di Dio quando un peccatore ritorna.",coeur:"Dio non ci aspetta con rimproveri. Ci aspetta con una gioia traboccante.",invitation:"Torna a Dio oggi se ti sei allontanato. La sua gioia ti aspetta."},
{ref:"Lc 15,20",texte:"Era ancora lontano quando suo padre lo vide e commosso gli corse incontro.",theme:"Misericordia",resume:"L'immagine più bella della misericordia divina.",coeur:"Dio corre. Si precipita. La sua misericordia è più veloce dei nostri peccati.",invitation:"Ricevi l'amore del Padre oggi. Lasciati abbracciare da Lui."},
{ref:"Lc 17,21",texte:"Il regno di Dio è in mezzo a voi.",theme:"Interiorità",resume:"Il Regno è già in noi.",coeur:"Questo versetto è un invito all'interiorità. Cercare Dio dentro, nel silenzio del cuore.",invitation:"Fai silenzio per cinque minuti oggi. Cerca il Regno in te."},
{ref:"Lc 19,10",texte:"Il Figlio dell'uomo è venuto a cercare e a salvare ciò che era perduto.",theme:"Salvezza",resume:"La missione di Gesù riassunta in una frase.",coeur:"È venuto a cercare. Non ad aspettare. A cercare.",invitation:"Medita: Gesù ti ha cercato. Dove lo hai incontrato?"},
{ref:"Lc 23,34",texte:"Padre, perdonali, perché non sanno quello che fanno.",theme:"Perdono",resume:"La preghiera di Gesù sulla croce per i suoi carnefici.",coeur:"Sulla croce, Gesù prega per coloro che lo uccidono. L'amore al suo vertice assoluto.",invitation:"Prega per qualcuno che ti ha fatto del male senza rendersene conto."},
{ref:"Lc 23,43",texte:"In verità ti dico: oggi sarai con me nel paradiso.",theme:"Misericordia",resume:"La promessa di Gesù al buon ladrone: la salvezza all'ultimo momento.",coeur:"Oggi. La misericordia di Gesù è immediata.",invitation:"Qualunque sia il tuo passato, credi che la misericordia di Dio è più grande."},
{ref:"Lc 24,29",texte:"Rimani con noi, perché si fa sera.",theme:"Presenza",resume:"I discepoli di Emmaus invitano lo Sconosciuto a restare.",coeur:"Spesso riconosciamo Gesù dopo. Ma possiamo invitarlo a restare.",invitation:"Invita Gesù a rimanere con te questa sera."},
{ref:"Gv 1,14",texte:"Il Verbo si fece carne e venne ad abitare in mezzo a noi.",theme:"Incarnazione",resume:"Il cuore del mistero cristiano: Dio si fa uomo.",coeur:"Dio non è rimasto a distanza. Ha abitato in mezzo a noi.",invitation:"Contempla il volto di qualcuno che ami. La gloria di Dio può brillarvi."},
{ref:"Gv 3,16",texte:"Dio ha tanto amato il mondo da dare il suo Figlio unigenito.",theme:"Amore di Dio",resume:"La sintesi dell'amore divino.",coeur:"Dio non ha amato in modo teorico. Ha dato tutto. Il suo amore è concreto e irreversibile.",invitation:"Sostituisci 'il mondo' con il tuo nome. Lascia che questo versetto ti raggiunga."},
{ref:"Gv 4,14",texte:"Chi beve dell'acqua che io gli darò non avrà più sete in eterno.",theme:"Vita interiore",resume:"Gesù promette acqua viva che disseta la sete profonda dell'anima.",coeur:"Solo Dio può dissetare la sete profonda della tua anima.",invitation:"Nomina la tua sete più profonda. Portala a Gesù."},
{ref:"Gv 6,35",texte:"Io sono il pane della vita; chi viene a me non avrà più fame.",theme:"Eucaristia",resume:"Gesù si rivela come nutrimento essenziale dell'anima.",coeur:"Solo Gesù, pane della vita, può davvero nutrirci.",invitation:"Ricevi la comunione questa settimana con uno sguardo rinnovato."},
{ref:"Gv 8,12",texte:"Io sono la luce del mondo; chi segue me non camminerà nelle tenebre.",theme:"Luce",resume:"Gesù si rivela come luce che guida nell'oscurità.",coeur:"Gesù non promette di eliminare le zone d'ombra, ma di attraversarle con noi, illuminandole.",invitation:"In quale zona d'ombra hai bisogno della luce di Gesù in questo momento?"},
{ref:"Gv 8,32",texte:"Conoscerete la verità e la verità vi farà liberi.",theme:"Libertà",resume:"La verità rivelata da Gesù come cammino di libertà interiore.",coeur:"La verità che Gesù offre non è prima di tutto una dottrina — è una Persona.",invitation:"C'è una menzogna su te stesso da cui hai bisogno di essere liberato?"},
{ref:"Gv 10,10",texte:"Sono venuto perché abbiano la vita e l'abbiano in abbondanza.",theme:"Vita",resume:"La vita che Gesù porta è pienezza.",coeur:"La vita in abbondanza è una vita abitata, significativa, collegata a Dio e agli altri.",invitation:"In che modo la tua vita è abbondante? Ringrazia."},
{ref:"Gv 10,11",texte:"Io sono il buon pastore. Il buon pastore dà la propria vita per le pecore.",theme:"Amore",resume:"L'amore totale del pastore che arriva fino al dono di sé.",coeur:"Il buon pastore conosce ogni pecora per nome. Sei conosciuto, amato, cercato.",invitation:"Medita che Gesù ti conosce per nome. Lasciati toccare da questo."},
{ref:"Gv 11,25",texte:"Io sono la risurrezione e la vita; chi crede in me, anche se muore, vivrà.",theme:"Risurrezione",resume:"Gesù rivela la sua vittoria sulla morte.",coeur:"Di fronte alla morte, Gesù risponde: Io sono la vita.",invitation:"Se porti un lutto o paura della morte, affidalo a Colui che è la Risurrezione."},
{ref:"Gv 11,35",texte:"Gesù scoppiò in pianto.",theme:"Compassione",resume:"Il versetto più breve della Bibbia: Gesù piange con noi.",coeur:"Dio piange con noi. Non è indifferente ai nostri lutti.",invitation:"Se porti un lutto, lascia che Gesù pianga con te."},
{ref:"Gv 13,34",texte:"Amatevi gli uni gli altri come io vi ho amato.",theme:"Amore",resume:"Il comandamento centrale di Gesù.",coeur:"'Come io vi ho amato' — questa è la misura. Un amore che arriva fino in fondo.",invitation:"Chi ha più bisogno di essere amato intorno a te oggi?"},
{ref:"Gv 14,1",texte:"Non sia turbato il vostro cuore. Abbiate fede in Dio e abbiate fede anche in me.",theme:"Pace",resume:"Gesù calma i cuori turbati dei suoi discepoli.",coeur:"Gesù conosce le nostre turbolenze. Posa la sua mano su di esse e dice: Non temete.",invitation:"Posa la tua turbolenza attuale davanti a Gesù. Lascialo dirti queste parole."},
{ref:"Gv 14,6",texte:"Io sono la via, la verità e la vita.",theme:"Mistero",resume:"Gesù è lui stesso la risposta a ogni ricerca spirituale.",coeur:"Non una strada, non un insegnamento — una Persona. Il cammino ha un volto.",invitation:"Quale dei tre termini ti tocca di più: Via, Verità, o Vita?"},
{ref:"Gv 14,16",texte:"Io pregherò il Padre ed egli vi darà un altro Paraclito perché rimanga con voi per sempre.",theme:"Spirito Santo",resume:"La promessa del Paraclito: lo Spirito Santo come presenza permanente.",coeur:"Non siete orfani. Lo Spirito è con voi per sempre.",invitation:"Parla allo Spirito Santo oggi. Chiedigli di guidarti."},
{ref:"Gv 14,27",texte:"Vi lascio la pace, vi do la mia pace.",theme:"Pace",resume:"La pace di Gesù è di natura diversa da quella del mondo.",coeur:"La pace di Cristo esiste nel cuore delle tempeste. È una presenza, non un'assenza.",invitation:"Chiedi la pace di Cristo per la tua giornata."},
{ref:"Gv 15,4",texte:"Rimanete in me e io in voi.",theme:"Unione con Dio",resume:"Invito a una permanente unione con Cristo.",coeur:"Rimanere in Gesù non è una performance spirituale. È uno stato di relazione, di reciproca abitazione.",invitation:"Ritorna a questa consapevolezza durante tutta la giornata: Gesù rimane in me."},
{ref:"Gv 15,5",texte:"Io sono la vite, voi i tralci. Chi rimane in me porta molto frutto.",theme:"Fecondità",resume:"La nostra fecondità viene dalla nostra unione con Cristo.",coeur:"Il frutto viene dalla nostra unione con la vite, non dai nostri sforzi separati.",invitation:"La tua azione viene dall'unione con Dio o dal tuo solo sforzo?"},
{ref:"Gv 15,9",texte:"Come il Padre ha amato me, così anch'io ho amato voi. Rimanete nel mio amore.",theme:"Amore di Dio",resume:"L'amore di Cristo per noi è pari all'amore del Padre per il Figlio.",coeur:"Questo amore è immenso, eterno, incondizionato.",invitation:"Ripeti lentamente: Gesù mi ama come il Padre lo ama."},
{ref:"Gv 15,13",texte:"Nessuno ha un amore più grande di questo: dare la vita per i propri amici.",theme:"Amore",resume:"La definizione ultima dell'amore secondo Gesù.",coeur:"Gesù non parla da teorico. Vive ciò che dice.",invitation:"Pensa a qualcuno che ha dato molto per te. Ringrazialo."},
{ref:"Gv 16,22",texte:"Il vostro cuore si rallegrerà e nessuno vi potrà togliere la vostra gioia.",theme:"Speranza",resume:"La promessa di una gioia definitiva e indistruttibile.",coeur:"Nessuno può toglierti questa gioia. È fondata sulla presenza del Risorto.",invitation:"Se sei nella tristezza, aggrappati a questa promessa."},
{ref:"Gv 16,33",texte:"Nel mondo avrete tribolazioni, ma abbiate fiducia; io ho vinto il mondo.",theme:"Speranza",resume:"La vittoria di Cristo è il nostro fondamento nell'epreuve.",coeur:"Gesù non promette l'assenza di sofferenza. Promette la sua presenza vittoriosa.",invitation:"La tua prova attuale non ha l'ultima parola. Gesù ha vinto."},
{ref:"Gv 17,3",texte:"Questa è la vita eterna: che conoscano te, l'unico vero Dio.",theme:"Vita eterna",resume:"La vita eterna come relazione di intima conoscenza.",coeur:"Conoscere Dio — non solo sapere cose su di Lui, ma incontrarlo.",invitation:"Approfondisci la tua intima conoscenza di Dio oggi."},
{ref:"Gv 20,19",texte:"Gesù venne, stette in mezzo a loro e disse: Pace a voi!",theme:"Pace",resume:"La prima parola del Risorto.",coeur:"I discepoli sono rinchiusi, spaventati, spezzati. Gesù attraversa i loro muri.",invitation:"Lascia che Gesù attraversi oggi i muri del tuo cuore chiuso."},
{ref:"Gv 20,27",texte:"Non essere più incredulo ma credente!",theme:"Fede",resume:"Gesù accoglie il dubbio di Tommaso con tenerezza.",coeur:"Gesù non condanna Tommaso per il suo dubbio. Va verso di lui con le sue ferite.",invitation:"Porta i tuoi dubbi a Dio. Può trasformarli in fede."},
{ref:"Gv 21,15",texte:"Simone, figlio di Giovanni, mi ami tu?",theme:"Amore",resume:"Il Gesù risorto interroga Pietro sul suo amore.",coeur:"Dopo il rinnegamento, Gesù non rimprovera nulla. Chiede: Mi ami?",invitation:"Rispondi a questa domanda oggi: Mi ami?"},
{ref:"At 1,8",texte:"Riceverete la forza dallo Spirito Santo che scenderà su di voi, e mi sarete testimoni.",theme:"Missione",resume:"La missione universale animata dallo Spirito.",coeur:"Non siamo soli nel testimoniare. Lo Spirito ci precede e ci ispira.",invitation:"Chiedi allo Spirito Santo di guidare la tua testimonianza quotidiana oggi."},
{ref:"At 2,4",texte:"Furono tutti pieni di Spirito Santo.",theme:"Spirito Santo",resume:"La Pentecoste: lo Spirito trasforma i discepoli.",coeur:"Lo Spirito può trasformare uomini timorosi in testimoni coraggiosi.",invitation:"Chiedi un'effusione dello Spirito Santo per la tua vita oggi."},
{ref:"At 4,20",texte:"Noi non possiamo tacere quello che abbiamo visto e ascoltato.",theme:"Testimonianza",resume:"Pietro e Giovanni non possono tacere ciò che hanno vissuto con Gesù.",coeur:"La testimonianza nasce da un'esperienza. Puoi condividere solo ciò che hai davvero incontrato.",invitation:"Racconta a qualcuno cosa ha fatto Dio nella tua vita, anche brevemente."},
{ref:"Rm 5,5",texte:"La speranza poi non delude, perché l'amore di Dio è stato riversato nei nostri cuori.",theme:"Speranza",resume:"Lo Spirito è il garante della speranza cristiana.",coeur:"La speranza cristiana si basa sull'amore di Dio riversato in noi.",invitation:"Rinnova la tua speranza oggi. Appoggiarti sull'amore di Dio."},
{ref:"Rm 8,1",texte:"Non vi è dunque più nessuna condanna per quelli che sono in Cristo Gesù.",theme:"Libertà",resume:"La libertà radicale del cristiano.",coeur:"Nessuna condanna. Questa libertà è un dono.",invitation:"Se una voce ti condanna, rispondile con questo versetto."},
{ref:"Rm 8,15",texte:"Non avete ricevuto uno spirito da schiavi per ricadere nella paura, ma avete ricevuto uno spirito da figli adottivi.",theme:"Filiazione",resume:"Lo Spirito ci costituisce figli e figlie di Dio.",coeur:"La paura è il segno della schiavitù. La libertà è il segno della filiazione.",invitation:"Sei figlio di Dio, non schiavo."},
{ref:"Rm 8,26",texte:"Lo Spirito viene in aiuto alla nostra debolezza, perché nemmeno sappiamo che cosa sia conveniente domandare.",theme:"Preghiera",resume:"Lo Spirito prega in noi quando non sappiamo più come pregare.",coeur:"Anche quando la preghiera è impossibile, lo Spirito prende il testimone.",invitation:"Affida al Spirito oggi la tua incapacità di pregare."},
{ref:"Rm 8,28",texte:"Noi sappiamo che tutto concorre al bene di coloro che amano Dio.",theme:"Provvidenza",resume:"La Provvidenza divina lavora anche nell'avversità.",coeur:"'Tutto' — anche le prove, i fallimenti, i tradimenti. Dio può trarre bene da tutto.",invitation:"Chiedi a Dio di mostrarti come sta traendo bene dalla tua situazione difficile."},
{ref:"Rm 8,31",texte:"Se Dio è per noi, chi sarà contro di noi?",theme:"Fiducia",resume:"La certezza assoluta dell'amore protettivo di Dio.",coeur:"Nulla può prevalere su colui che Dio sostiene.",invitation:"Recita questo versetto di fronte ai tuoi ostacoli attuali."},
{ref:"Rm 8,38",texte:"Né morte né vita... potrà mai separarci dall'amore di Dio in Cristo Gesù.",theme:"Amore di Dio",resume:"L'inseparabilità dell'amore di Dio.",coeur:"Quando tutto vacilla, l'amore di Dio rimane.",invitation:"Porta questo versetto come uno scudo nei momenti di disperazione."},
{ref:"Rm 12,2",texte:"Non conformatevi a questo mondo, ma lasciatevi trasformare rinnovando il vostro modo di pensare.",theme:"Conversione",resume:"La conversione è una trasformazione interiore della prospettiva.",coeur:"La trasformazione viene dall'interno. Cambiare il modo di vedere, di pensare.",invitation:"Chiedi lo Spirito di rinnovamento per il tuo modo di pensare."},
{ref:"Rm 12,12",texte:"Siate lieti nella speranza, costanti nella tribolazione, perseveranti nella preghiera.",theme:"Vita cristiana",resume:"Tre atteggiamenti fondamentali del cristiano di fronte alla prova.",coeur:"Gioia, pazienza, preghiera — un compatto programma di vita spirituale.",invitation:"Quale di questi tre atteggiamenti ti manca di più? Lavoraci oggi."},
{ref:"1Cor 13,4",texte:"La carità è paziente, è benigna la carità; non è invidiosa la carità.",theme:"Amore",resume:"Paolo descrive il vero amore attraverso le sue qualità concrete.",coeur:"Questo testo è uno specchio. Sostituisci 'carità' con il tuo nome.",invitation:"Leggi 1Cor 13 lentamente sostituendo 'carità' con il tuo nome."},
{ref:"1Cor 13,13",texte:"Ora dunque rimangono queste tre cose: la fede, la speranza e la carità; ma la più grande di tutte è la carità.",theme:"Amore",resume:"Le tre virtù teologali con la primazia dell'amore.",coeur:"Solo l'amore rimane per l'eternità.",invitation:"Fai un atto gratuito di amore oggi, senza aspettarti nulla in cambio."},
{ref:"2Cor 4,16",texte:"Anche se il nostro uomo esteriore si va disfacendo, quello interiore si rinnova di giorno in giorno.",theme:"Speranza",resume:"Il rinnovamento interiore nonostante il deterioramento esteriore.",coeur:"Lo Spirito rinnova dall'interno anche quando l'esterno si deteriora.",invitation:"Prenditi cura della tua vita interiore con un tempo di preghiera e silenzio."},
{ref:"2Cor 5,17",texte:"Se uno è in Cristo, è una nuova creatura.",theme:"Conversione",resume:"In Cristo inizia una nuova creazione.",coeur:"Non sei condannato a restare quello che sei. In Cristo c'è un perpetuo nuovo inizio.",invitation:"Ricevi oggi la tua identità di nuova creatura."},
{ref:"2Cor 12,9",texte:"Ti basta la mia grazia; la mia potenza si manifesta pienamente nella debolezza.",theme:"Debolezza",resume:"Il potere di Dio si manifesta nella nostra debolezza.",coeur:"Dio sceglie le nostre crepe come luoghi per dispiegare il suo potere.",invitation:"Offri a Dio la tua principale debolezza come luogo del suo potere."},
{ref:"Gal 2,20",texte:"Non sono più io che vivo, ma Cristo vive in me.",theme:"Unione con Dio",resume:"La vita cristiana come partecipazione alla vita di Cristo.",coeur:"Questo capovolgimento è il cuore della vita cristiana.",invitation:"Medita questa frase al risveglio: Non sono più io che vivo, ma Cristo."},
{ref:"Gal 5,22",texte:"Il frutto dello Spirito invece è amore, gioia, pace, magnanimità, dolcezza, bontà.",theme:"Spirito Santo",resume:"I frutti visibili di una vita abitata da Dio.",coeur:"Questi frutti non si ottengono con lo sforzo. Vengono dallo Spirito.",invitation:"Quale di questi frutti manca nella tua vita? Chiedilo allo Spirito Santo."},
{ref:"Ef 2,8",texte:"È per grazia che siete stati salvati mediante la fede; e ciò non viene da voi, ma è dono di Dio.",theme:"Grazia",resume:"La salvezza è interamente un dono gratuito di Dio.",coeur:"Non guadagniamo la nostra salvezza. La riceviamo.",invitation:"Ringrazia per ciò che non hai meritato."},
{ref:"Ef 3,17",texte:"Che il Cristo abiti per la fede nei vostri cuori e così siate radicati e fondati nell'amore.",theme:"Unione con Dio",resume:"Paolo prega affinché Cristo si stabilisca profondamente nei cuori.",coeur:"Un albero profondamente radicato resiste alle tempeste.",invitation:"Verifica la profondità delle tue radici spirituali."},
{ref:"Ef 4,32",texte:"Siate invece benevoli e misericordiosi gli uni verso gli altri, perdonandovi a vicenda come Dio ha perdonato voi in Cristo.",theme:"Perdono",resume:"Il modello del perdono cristiano è il perdono stesso di Dio.",coeur:"Perdonare come Dio perdona — senza condizioni, senza calcolo, per puro amore.",invitation:"Perdona oggi qualcuno come Dio ti ha perdonato."},
{ref:"Fil 4,4",texte:"Siate sempre lieti nel Signore, ve lo ripeto: siate lieti.",theme:"Gioia",resume:"Paolo ordina la gioia come postura spirituale.",coeur:"La gioia cristiana è un orientamento dell'anima verso Dio.",invitation:"Scegli la gioia oggi. La gioia profonda ancorata in Dio."},
{ref:"Fil 4,6",texte:"Non angustiatevi per nulla, ma in ogni circostanza fate presenti a Dio le vostre richieste.",theme:"Preghiera",resume:"Paolo propone la preghiera come antidoto all'ansia.",coeur:"Trasforma ogni preoccupazione in preghiera.",invitation:"Scegli una delle tue preoccupazioni e trasformala in una preghiera concreta adesso."},
{ref:"Fil 4,7",texte:"E la pace di Dio, che supera ogni intelligenza, custodirà i vostri cuori.",theme:"Pace",resume:"La pace divina supera ogni comprensione umana.",coeur:"Questa pace non dipende dalle circostanze. Viene da Dio.",invitation:"Chiedi questa pace che supera l'intelligenza."},
{ref:"Fil 4,13",texte:"Tutto posso in colui che mi dà la forza.",theme:"Forza",resume:"Paolo esprime la sua assoluta fiducia nella forza che Cristo gli dà.",coeur:"Non: posso tutto con la mia volontà. Ma: in Colui che mi dà forza.",invitation:"Affronta la tua sfida di oggi con questa fiducia."},
{ref:"Col 3,16",texte:"La parola di Cristo abiti in voi abbondantemente.",theme:"Parola",resume:"L'invito a lasciare che la Parola abiti abbondantemente la nostra vita interiore.",coeur:"La Parola è fatta per abitare i nostri cuori e ispirare i nostri atti.",invitation:"Scegli un versetto da memorizzare questa settimana. Lascialo abitarti."},
{ref:"1Ts 5,16",texte:"Siate sempre lieti.",theme:"Gioia",resume:"L'esortazione più breve di Paolo.",coeur:"La gioia non è riservata ai giorni felici. È una decisione spirituale.",invitation:"Fai la scelta consapevole della gioia oggi."},
{ref:"1Ts 5,17",texte:"Pregate ininterrottamente.",theme:"Preghiera",resume:"La preghiera continua come atmosfera della vita cristiana.",coeur:"Pregare ininterrottamente significa vivere in una continua conversazione interiore con Dio.",invitation:"Adotta una breve formula di preghiera da ripetere durante tutta la giornata."},
{ref:"1Ts 5,18",texte:"In ogni cosa rendete grazie.",theme:"Gratitudine",resume:"Il rendimento di grazie in ogni circostanza.",coeur:"Ringraziare nella prova non è rassegnazione. È fede che Dio può trarre bene da tutto.",invitation:"Rendi grazie per qualcosa di difficile che stai attraversando."},
{ref:"Eb 4,12",texte:"Difatti la parola di Dio è viva, efficace e più tagliente di qualsiasi spada a doppio taglio.",theme:"Parola",resume:"La Parola di Dio è viva e potente.",coeur:"La Parola non è un testo inerte. È viva. Agisce.",invitation:"Leggi un passo della Scrittura oggi, lasciandogli il tempo di agire in te."},
{ref:"Eb 11,1",texte:"La fede è fondamento di ciò che si spera e prova di ciò che non si vede.",theme:"Fede",resume:"La definizione classica della fede.",coeur:"La fede riguarda ciò che non vediamo ancora ma che è più reale di ciò che vediamo.",invitation:"Su cosa si basa la tua fede oggi?"},
{ref:"Eb 13,8",texte:"Gesù Cristo è lo stesso ieri, oggi e sempre.",theme:"Fedeltà",resume:"L'immutabilità di Cristo come fondamento della fede.",coeur:"Tutto cambia. Ma Gesù Cristo non cambia. La sua fedeltà è assoluta.",invitation:"Appoggiarti sulla fedeltà immutabile di Cristo oggi."},
{ref:"Gc 1,17",texte:"Ogni buon regalo e ogni dono perfetto viene dall'alto.",theme:"Gratitudine",resume:"Ogni bene ricevuto viene da Dio.",coeur:"Niente di buono è frutto del solo caso. Ogni bene è un dono dall'alto.",invitation:"Fai un elenco di tre doni nella tua vita. Ringrazia il donatore."},
{ref:"Gc 4,8",texte:"Avvicinatevi a Dio ed egli si avvicinerà a voi.",theme:"Preghiera",resume:"La reciprocità del movimento verso Dio.",coeur:"Dio rispetta la nostra libertà. Ogni passo verso di Lui è ricevuto e accompagnato.",invitation:"Fai un passo concreto verso Dio oggi."},
{ref:"1Pt 1,8",texte:"Senza averlo visto, lo amate; senza vederlo ora, credete in lui.",theme:"Fede",resume:"La fede che ama senza vedere.",coeur:"Non abbiamo visto Gesù. Eppure lo amiamo. Questa fede è una grazia straordinaria.",invitation:"Lascia che questo amore salga in te per Colui che non hai visto."},
{ref:"1Pt 5,7",texte:"Scaricate ogni vostra preoccupazione su di lui, egli ha cura di voi.",theme:"Fiducia",resume:"Dio si prende cura di noi.",coeur:"Un'attenzione personale, tenera, continua.",invitation:"Affida a Dio ogni preoccupazione che porti in questo momento."},
{ref:"1Gv 1,9",texte:"Se confessiamo i nostri peccati, egli è fedele e giusto da perdonarci i peccati.",theme:"Perdono",resume:"La confessione sincera è accolta dalla fedeltà di Dio.",coeur:"Il suo perdono si basa sulla nostra onestà con Lui, non sulla nostra perfezione.",invitation:"Riconosci onestamente davanti a Dio ciò che pesa sulla tua coscienza. Ricevi il suo perdono."},
{ref:"1Gv 3,1",texte:"Vedete quanto amore ci ha dato il Padre per essere chiamati figli di Dio, e lo siamo realmente!",theme:"Filiazione",resume:"La meraviglia di Giovanni davanti alla nostra dignità di figli e figlie di Dio.",coeur:"E lo siamo realmente! Non solo chiamati — lo siamo davvero.",invitation:"Contempla la tua identità di figlio di Dio. Lascia che quella meraviglia ti tocchi."},
{ref:"1Gv 4,8",texte:"Chi non ama non ha conosciuto Dio, perché Dio è amore.",theme:"Amore",resume:"L'equazione fondamentale: Dio è amore.",coeur:"Dio non ha l'amore come attributo tra gli altri. Lui È amore.",invitation:"Medita: Dio è amore. Cosa cambia nella tua immagine di Dio?"},
{ref:"1Gv 4,18",texte:"Non c'è timore nell'amore; al contrario, l'amore perfetto scaccia il timore.",theme:"Amore",resume:"L'amore perfetto libera da ogni paura.",coeur:"L'amore è la guarigione della paura.",invitation:"Chiedi all'amore di Dio di scacciare una paura che abita il tuo cuore."},
{ref:"1Gv 4,19",texte:"Noi amiamo perché egli ci ha amati per primo.",theme:"Amore",resume:"Il nostro amore è una risposta all'iniziativa di Dio.",coeur:"L'amore di Dio è la fonte, non la ricompensa.",invitation:"Lascia che l'amore di Dio ispiri il tuo amore verso gli altri."},
{ref:"Ap 3,20",texte:"Ecco, sto alla porta e busso. Se qualcuno ascolta la mia voce e apre la porta, io entrerò da lui.",theme:"Presenza",resume:"Gesù alla porta del cuore.",coeur:"Gesù non forza le porte. Bussa. Aspetta. Rispetta la tua libertà.",invitation:"Apri la porta a Gesù oggi."},
{ref:"Ap 21,4",texte:"Asciugherà ogni lacrima dai loro occhi e non vi sarà più la morte.",theme:"Speranza",resume:"La promessa di una vita senza lacrime né morte.",coeur:"Ogni lacrima verrà asciugata. Non ignorata — asciugata, con tenerezza.",invitation:"Se porti un dolore, offriloa Dio con questa promessa."},
{ref:"Ap 22,20",texte:"Vieni, Signore Gesù!",theme:"Speranza",resume:"La preghiera finale della Bibbia.",coeur:"Queste tre parole riassumono tutta la spiritualità cristiana.",invitation:"Prega queste tre parole con tutto il tuo cuore: Vieni, Signore Gesù!"}

];

let langue = 'fr';
let versetCourant = null;
let versetsActuels = versets_fr;

// Clé du jour pour reset à minuit
function getCleJour() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function getState() {
  const cle = getCleJour();
  const raw = localStorage.getItem('mav_state');
  if (raw) {
    const s = JSON.parse(raw);
    if (s.jour === cle) return s;
  }
  return { jour: cle, questions: 0, versets: [], abonne: false };
}

function saveState(s) {
  localStorage.setItem('mav_state', JSON.stringify(s));
}

// ══════════════════════════════
// NAVIGATION
// ══════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  majCompteurBar();
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ══════════════════════════════
// LOGIQUE QUESTIONS
// ══════════════════════════════
function demanderVerset() {
  const s = getState();
  const max = s.abonne ? 3 : 2;

  if (s.questions >= max) {
    showPage('page-limite');
    return;
  }

  // Nouveau verset
  nouveauVerset();
  s.questions++;

  // Sauvegarder verset complet du jour
  s.versets.push({
    ref: versetCourant.ref,
    texte: versetCourant.texte,
    theme: versetCourant.theme,
    resume: versetCourant.resume,
    coeur: versetCourant.coeur,
    invitation: versetCourant.invitation
  });
  saveState(s);

  // Afficher page 2
  document.getElementById('verset-ref').textContent = versetCourant.ref;
  document.getElementById('verset-texte').textContent = '\u00ab ' + versetCourant.texte + ' \u00bb';
  document.getElementById('verset-theme').textContent = versetCourant.theme;
  showPage('page2');
}

function allerPage3() {
  document.getElementById('med-ref').textContent = versetCourant.ref;
  document.getElementById('med-resume').textContent = versetCourant.resume;
  document.getElementById('med-coeur').textContent = versetCourant.coeur;
  document.getElementById('med-invitation').textContent = versetCourant.invitation;
  showPage('page3');
}

function allerAbonnement() {
  alert('Abonnement à venir ! Cette fonctionnalité sera disponible prochainement.');
}

function nouveauVerset() {
  versetCourant = versetsActuels[Math.floor(Math.random() * versetsActuels.length)];
}

// ══════════════════════════════
// COMPTEUR BAR
// ══════════════════════════════
function majCompteurBar() {
  const s = getState();
  const t = UI[langue];
  const max = s.abonne ? 3 : 2;
  const restantes = Math.max(0, max - s.questions);

  const dots = document.getElementById('compteur-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 2; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < s.questions ? ' used' : '');
    dots.appendChild(d);
  }
  // 3ème dot (abonnement)
  const d3 = document.createElement('div');
  d3.className = 'dot' + (s.questions >= 3 ? ' used' : ' locked');
  dots.appendChild(d3);

  const labelIdx = Math.min(s.questions, 2);
  document.getElementById('compteur-label').textContent = t.compteurLabel[labelIdx];
  document.getElementById('btn-sub-bar').textContent = t.barLabel;
}

// ══════════════════════════════
// PRIÈRE DU JOUR
// ══════════════════════════════
function showPriere() {
  const t = UI[langue];
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const idx = (dayOfYear - 1) % 366;
  const priere = PRIERES[langue][idx];

  document.getElementById('priere-titre').textContent = t.priereTitre;
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('priere-date').textContent = now.toLocaleDateString(langue === 'fr' ? 'fr-FR' : langue === 'en' ? 'en-US' : langue === 'es' ? 'es-ES' : 'it-IT', options);
  document.getElementById('priere-texte').textContent = priere;
  document.getElementById('btn-retour-priere').textContent = t.retourMenu;
  showPage('page-priere');
}

// ══════════════════════════════
// MES VERSETS DU JOUR
// ══════════════════════════════
function showVersets() {
  const t = UI[langue];
  const s = getState();
  document.getElementById('versets-titre').textContent = t.versetsJourTitre;
  document.getElementById('btn-retour-versets').textContent = t.retourMenu;

  const liste = document.getElementById('versets-liste');
  liste.innerHTML = '';

  if (s.versets.length === 0) {
    liste.innerHTML = '<p class="empty-msg">' + t.versetsVide.replace(/\n/g,'<br>') + '</p>';
  } else {
    s.versets.forEach((v, i) => {
      const num = document.createElement('p');
      num.style.cssText = 'font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:#a07840;font-weight:700;margin-bottom:0.5rem;margin-top:'+(i>0?'1.5rem':'0');
      num.textContent = (langue==='fr'?'Question':langue==='en'?'Question':langue==='es'?'Pregunta':'Domanda') + ' ' + (i+1);
      liste.appendChild(num);

      const refEl = document.createElement('div');
      refEl.style.cssText = 'font-family:\'IM Fell English\',serif;font-style:italic;color:#a07840;font-size:1rem;margin-bottom:0.8rem;font-weight:700;';
      refEl.textContent = v.ref;
      liste.appendChild(refEl);

      const texteEl = document.createElement('div');
      texteEl.style.cssText = 'font-size:1.1rem;font-style:italic;color:#000;padding:1rem 1.2rem;border-left:2px solid #a07840;margin-bottom:1rem;font-weight:400;line-height:1.8;';
      texteEl.textContent = '\u00ab ' + v.texte + ' \u00bb';
      liste.appendChild(texteEl);

      const b1 = document.createElement('div');
      b1.className = 'meditation-bloc';
      b1.innerHTML = '<div class="meditation-titre">' + t.titreResume + '</div><div class="meditation-texte" style="color:#000;">' + (v.resume||'') + '</div>';
      liste.appendChild(b1);

      const b2 = document.createElement('div');
      b2.className = 'meditation-bloc';
      b2.innerHTML = '<div class="meditation-titre">' + t.titreCoeur + '</div><div class="meditation-texte" style="color:#000;">' + (v.coeur||'') + '</div>';
      liste.appendChild(b2);

      const b3 = document.createElement('div');
      b3.className = 'meditation-bloc';
      b3.innerHTML = '<div class="meditation-titre">' + t.titreInvitation + '</div><div class="meditation-texte" style="color:#000;">' + (v.invitation||'') + '</div>';
      liste.appendChild(b3);
    });
  }
  showPage('page-versets');
}

// ══════════════════════════════
// LANGUE
// ══════════════════════════════
function setLang(l) {
  langue = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.lang-btn[onclick="setLang(\''+l+'\')"]').classList.add('active');
  versetsActuels = l==='fr' ? versets_fr : l==='en' ? versets_en : l==='es' ? versets_es : versets_it;
  nouveauVerset();
  majUI();
  showPage('page1');
}

function majUI() {
  const t = UI[langue];
  document.getElementById('app-titre').textContent = t.titre;
  document.getElementById('app-sous-titre').textContent = t.sousTitre;
  document.getElementById('app-intro').innerHTML = t.intro;
  document.getElementById('app-btn-pret').textContent = t.btnPret;
  document.getElementById('app-parole-repond').textContent = t.paroleRepond;
  document.getElementById('app-lire').innerHTML = t.lire;
  document.getElementById('app-btn-mediter').textContent = t.btnMediter;
  document.getElementById('app-retour').textContent = t.retour;
  document.getElementById('app-titre-resume').textContent = t.titreResume;
  document.getElementById('app-titre-coeur').textContent = t.titreCoeur;
  document.getElementById('app-titre-invitation').textContent = t.titreInvitation;
  document.getElementById('app-relire').textContent = t.relire;
  document.getElementById('menu-accueil').textContent = t.menuAccueil;
  document.getElementById('menu-priere').textContent = t.menuPriere;
  document.getElementById('menu-versets').textContent = t.menuVersets;
  document.getElementById('menu-fermer').textContent = t.menuFermer;
  document.getElementById('drawer-titre').textContent = t.drawerTitre;

  document.getElementById('btn-abonner').textContent = t.btnAbonner;
  document.getElementById('btn-retour-limite').textContent = t.retour;
  document.title = t.titre;
  majCompteurBar();
}

// INIT
nouveauVerset();
majUI();
</script>
